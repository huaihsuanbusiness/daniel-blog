name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          SITE: https://danielcanfly.com

      - name: Remove wrangler redirect config
        run: rm -rf .wrangler

      - name: Deploy to Cloudflare Workers
        run: |
          cd dist/server

          # Use printf + pipe for multi-line secret values (avoids echo multi-line issues)
          printf '%s\n' "$GOOGLE_SHEET_ID" | npx wrangler secret put GOOGLE_SHEET_ID --name daniel-blog --config wrangler.json
          printf '%s\n' "$GOOGLE_PRIVATE_KEY" | npx wrangler secret put GOOGLE_PRIVATE_KEY --name daniel-blog --config wrangler.json
          printf '%s\n' "$GOOGLE_SERVICE_ACCOUNT_EMAIL" | npx wrangler secret put GOOGLE_SERVICE_ACCOUNT_EMAIL --name daniel-blog --config wrangler.json

          npx wrangler deploy --message "${{ github.sha }}" --config wrangler.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}