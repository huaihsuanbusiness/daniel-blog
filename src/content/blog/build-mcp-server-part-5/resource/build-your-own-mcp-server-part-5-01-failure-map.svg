<svg width="1040" height="520" viewBox="0 0 1040 520" xmlns="http://www.w3.org/2000/svg">
<defs><style>
      .bg { fill: #f8fafc; }
      .title { font: 700 28px Arial, Inter, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 14px Arial, Inter, sans-serif; fill: #475569; }
      .box-title { font: 700 16px Arial, Inter, sans-serif; fill: #0f172a; }
      .box-text { font: 400 13px Arial, Inter, sans-serif; fill: #334155; }
      .note { font: 400 12px Arial, Inter, sans-serif; fill: #64748b; }
      .green { fill: #dcfce7; stroke: #86efac; }
      .blue { fill: #dbeafe; stroke: #93c5fd; }
      .orange { fill: #ffedd5; stroke: #fdba74; }
      .purple { fill: #ede9fe; stroke: #c4b5fd; }
      .pink { fill: #fce7f3; stroke: #f9a8d4; }
      .neutral { fill: #ffffff; stroke: #cbd5e1; }
      .edge { stroke-width: 1.5; rx: 18; ry: 18; }
      .line { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #94a3b8; stroke-width: 2; fill: none; stroke-dasharray: 6 6; marker-end: url(#arrow); }
    </style><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#64748b"/></marker></defs>
<rect class="bg" x="0" y="0" width="1040" height="520"/>
<text class="title" x="50" y="56">Operations Failure Map</text>
<text class="subtitle" x="50" y="82">A public MCP endpoint fails by layers, not by vibes.</text>
<rect class="blue edge" x="60" y="140" width="180" height="110"/>
<text class="box-title" x="80" y="170">Cloud Network</text>
<text class="box-text" x="80" y="194">VCN / subnet</text>
<text class="box-text" x="80" y="214">route table</text>
<text class="box-text" x="80" y="234">IGW / ingress rules</text>
<rect class="orange edge" x="300" y="140" width="180" height="110"/>
<text class="box-title" x="320" y="170">Host Reachability</text>
<text class="box-text" x="320" y="194">SSH</text>
<text class="box-text" x="320" y="214">public IP</text>
<text class="box-text" x="320" y="234">listening ports</text>
<rect class="purple edge" x="540" y="140" width="180" height="110"/>
<text class="box-title" x="560" y="170">Public Edge</text>
<text class="box-text" x="560" y="194">Cloudflare</text>
<text class="box-text" x="560" y="214">DNS / TLS</text>
<text class="box-text" x="560" y="234">nginx :443</text>
<rect class="pink edge" x="780" y="140" width="180" height="110"/>
<text class="box-title" x="800" y="170">MCP Transport</text>
<text class="box-text" x="800" y="194">/mcp path</text>
<text class="box-text" x="800" y="214">client expectation</text>
<text class="box-text" x="800" y="234">streaming mode</text>
<rect class="green edge" x="300" y="330" width="180" height="110"/>
<text class="box-title" x="320" y="360">App Process</text>
<text class="box-text" x="320" y="384">uvicorn</text>
<text class="box-text" x="320" y="404">FastMCP app</text>
<text class="box-text" x="320" y="424">tool registration</text>
<rect class="neutral edge" x="540" y="330" width="180" height="110"/>
<text class="box-title" x="560" y="360">Adapter Layer</text>
<text class="box-text" x="560" y="384">skill loader</text>
<text class="box-text" x="560" y="404">Make adapter</text>
<text class="box-text" x="560" y="424">.env config</text>
<path class="line" d="M240 195 H300"/>
<path class="line" d="M480 195 H540"/>
<path class="line" d="M720 195 H780"/>
<path class="line" d="M390 250 V330"/>
<path class="line" d="M630 250 V330"/>
</svg>