<svg width="1040" height="540" viewBox="0 0 1040 540" xmlns="http://www.w3.org/2000/svg">
<defs><style>
      .bg { fill: #f8fafc; }
      .title { font: 700 28px Arial, Inter, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 14px Arial, Inter, sans-serif; fill: #475569; }
      .box-title { font: 700 16px Arial, Inter, sans-serif; fill: #0f172a; }
      .box-text { font: 400 13px Arial, Inter, sans-serif; fill: #334155; }
      .note { font: 400 12px Arial, Inter, sans-serif; fill: #64748b; }
      .green { fill: #dcfce7; stroke: #86efac; }
      .blue { fill: #dbeafe; stroke: #93c5fd; }
      .orange { fill: #ffedd5; stroke: #fdba74; }
      .purple { fill: #ede9fe; stroke: #c4b5fd; }
      .pink { fill: #fce7f3; stroke: #f9a8d4; }
      .neutral { fill: #ffffff; stroke: #cbd5e1; }
      .edge { stroke-width: 1.5; rx: 18; ry: 18; }
      .line { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #94a3b8; stroke-width: 2; fill: none; stroke-dasharray: 6 6; marker-end: url(#arrow); }
    </style><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#64748b"/></marker></defs>
<rect class="bg" x="0" y="0" width="1040" height="540"/>
<text class="title" x="50" y="56">Deployment Drift Map</text>
<text class="subtitle" x="50" y="82">GitHub, the VM checkout, and the running process are three different realities.</text>
<rect class="blue edge" x="60" y="150" width="180" height="100"/>
<text class="box-title" x="80" y="180">Local Repo</text>
<text class="box-text" x="80" y="204">edited files</text>
<text class="box-text" x="80" y="224">latest commit</text>
<rect class="orange edge" x="300" y="150" width="180" height="100"/>
<text class="box-title" x="320" y="180">VM Checkout</text>
<text class="box-text" x="320" y="204">git pull?</text>
<text class="box-text" x="320" y="224">correct branch?</text>
<rect class="purple edge" x="540" y="150" width="180" height="100"/>
<text class="box-title" x="560" y="180">Virtualenv</text>
<text class="box-text" x="560" y="204">installed deps</text>
<text class="box-text" x="560" y="224">old package state</text>
<rect class="green edge" x="780" y="150" width="180" height="100"/>
<text class="box-title" x="800" y="180">systemd Service</text>
<text class="box-text" x="800" y="204">launch command</text>
<text class="box-text" x="800" y="224">working directory</text>
<rect class="neutral edge" x="300" y="330" width="420" height="120"/>
<text class="box-title" x="320" y="360">Drift symptoms</text>
<text class="box-text" x="320" y="384">repo looks updated but live server acts old</text>
<text class="box-text" x="320" y="404">service points at older checkout</text>
<text class="box-text" x="320" y="424">you debug the wrong version</text>
<path class="line" d="M240 200 H300"/>
<path class="line" d="M480 200 H540"/>
<path class="line" d="M720 200 H780"/>
<path class="line" d="M630 250 V330"/>
</svg>