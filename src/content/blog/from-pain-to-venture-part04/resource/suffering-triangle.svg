<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="760" viewBox="0 0 1100 760">
  <defs><style>text{font-family:Arial,'Noto Sans TC',sans-serif;fill:#1f2937}.title{font-size:32px;font-weight:700}.sub{font-size:18px;fill:#4b5563}.label{font-size:19px;font-weight:700}.note{font-size:16px;fill:#374151}</style></defs>
  <rect width="1100" height="760" fill="#fafafa"/>
  <text x="60" y="70" class="title">Suffering Triangle</text>
  <text x="60" y="105" class="sub">痛苦不是有或沒有，而是看對方痛到哪一層。</text>
  <polygon points="550,150 130,650 970,650" fill="#fff" stroke="#9ca3af" stroke-width="3"/>
  <line x1="214" y1="550" x2="886" y2="550" stroke="#9ca3af" stroke-width="2"/>
  <line x1="298" y1="450" x2="802" y2="450" stroke="#9ca3af" stroke-width="2"/>
  <line x1="382" y1="350" x2="718" y2="350" stroke="#9ca3af" stroke-width="2"/>
  <line x1="466" y1="250" x2="634" y2="250" stroke="#9ca3af" stroke-width="2"/>
  <text x="470" y="220" class="label">5. Has / can acquire budget</text>
  <text x="410" y="320" class="label">4. Assembled a homegrown solution</text>
  <text x="360" y="420" class="label">3. Actively looking for a solution</text>
  <text x="330" y="520" class="label">2. Is aware of having a problem</text>
  <text x="300" y="620" class="label">1. Has a problem</text>
  <rect x="60" y="690" width="980" height="44" rx="14" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="90" y="718" class="note">早期市場優先找第 4～5 層：已經自己拼解法，或有能力投入資源的人。</text>
</svg>
