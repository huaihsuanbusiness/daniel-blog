<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img" aria-labelledby="title desc">
  <title id="title">Suffering Triangle</title>
  <desc id="desc">Pain progresses in stages. Prioritize early adopters at stages 4-5: those who have assembled a homegrown solution or have the budget to act.</desc>
  <style>
    text{font-family:Arial,sans-serif;fill:#1f2937}.bg{fill:#fbfaf7}.box{fill:#fff;stroke:#d1d5db;stroke-width:2}.h{font-size:26px;font-weight:700}.t{font-size:16px;font-weight:700}.b{font-size:14px;fill:#475569}.small{font-size:12px;fill:#64748b}
  </style>
  <rect class="bg" x="0" y="0" width="800" height="520" rx="24"/>
  <text class="h" x="40" y="44">Suffering Triangle</text>
  <text class="b" x="40" y="68">Pain is not present or absent — it is about how far the pain has progressed.</text>

  <polygon points="400,70 620,440 180,440" fill="none" stroke="#fdba74" stroke-width="2.5"/>
  <polygon points="400,130 560,420 240,420" fill="none" stroke="#fdba74" stroke-width="2"/>
  <polygon points="400,190 500,400 300,400" fill="none" stroke="#fdba74" stroke-width="1.5"/>

  <rect class="box" x="150" y="100" width="500" height="44" rx="14"/>
  <text class="t" x="170" y="128">1. Has a problem</text>

  <rect class="box" x="130" y="180" width="540" height="44" rx="14"/>
  <text class="t" x="150" y="208">2. Is aware of having a problem</text>

  <rect class="box" x="110" y="260" width="580" height="44" rx="14"/>
  <text class="t" x="130" y="288">3. Actively looking for a solution</text>

  <rect class="box" x="90" y="340" width="620" height="44" rx="14" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
  <text class="t" x="110" y="368">4. Assembled a homegrown solution</text>
  <text class="b" x="720" y="368" fill="#fdba74">⚡</text>

  <rect class="box" x="70" y="420" width="660" height="44" rx="14" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
  <text class="t" x="90" y="448">5. Has or can acquire budget</text>
  <text class="b" x="740" y="448" fill="#fdba74">💰</text>

  <rect class="box" x="40" y="480" width="720" height="36" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text class="b" x="60" y="504">Priority: find stage 4-5 early adopters — those who have already assembled a workaround or have resources to invest.</text>
</svg>
