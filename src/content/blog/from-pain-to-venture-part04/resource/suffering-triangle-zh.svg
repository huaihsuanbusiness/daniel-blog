<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img" aria-labelledby="title desc">
  <title id="title">痛苦三角形</title>
  <desc id="desc">痛苦不是有或沒有，而是看對方痛到哪一層。優先找第 4～5 層：已經自己拼解法，或有能力投入資源的人。</desc>
  <style>
    text{font-family:'Noto Sans TC',Arial,sans-serif;fill:#1f2937}.bg{fill:#fbfaf7}.box{fill:#fff;stroke:#d1d5db;stroke-width:2}.h{font-size:26px;font-weight:700}.t{font-size:16px;font-weight:700}.b{font-size:14px;fill:#475569}.small{font-size:12px;fill:#64748b}
  </style>
  <rect class="bg" x="0" y="0" width="800" height="520" rx="24"/>
  <text class="h" x="40" y="44">痛苦三角形</text>
  <text class="b" x="40" y="68">痛苦不是有或沒有，而是看對方痛到哪一層。</text>

  <polygon points="400,70 620,440 180,440" fill="none" stroke="#fdba74" stroke-width="2.5"/>
  <polygon points="400,130 560,420 240,420" fill="none" stroke="#fdba74" stroke-width="2"/>
  <polygon points="400,190 500,400 300,400" fill="none" stroke="#fdba74" stroke-width="1.5"/>

  <rect class="box" x="150" y="100" width="500" height="44" rx="14"/>
  <text class="t" x="170" y="128">1. Has a problem｜有這個問題</text>

  <rect class="box" x="130" y="180" width="540" height="44" rx="14"/>
  <text class="t" x="150" y="208">2. Is aware of having a problem｜已經知道有這個問題</text>

  <rect class="box" x="110" y="260" width="580" height="44" rx="14"/>
  <text class="t" x="130" y="288">3. Actively looking for a solution｜積極在找解法</text>

  <rect class="box" x="90" y="340" width="620" height="44" rx="14" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
  <text class="t" x="110" y="368">4. Assembled a homegrown solution｜已經自己拼湊了解法</text>
  <text class="b" x="720" y="368" fill="#fdba74">⚡</text>

  <rect class="box" x="70" y="420" width="660" height="44" rx="14" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
  <text class="t" x="90" y="448">5. Has or can acquire budget｜有能力投入資源</text>
  <text class="b" x="740" y="448" fill="#fdba74">💰</text>

  <rect class="box" x="40" y="480" width="720" height="36" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text class="b" x="60" y="504">早期市場優先找第 4～5 層：已經自己拼解法，或有能力投入資源的人。</text>
</svg>
