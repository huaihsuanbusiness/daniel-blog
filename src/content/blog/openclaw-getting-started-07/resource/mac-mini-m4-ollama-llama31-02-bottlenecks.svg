  <text x="70" y="86" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">Common bottlenecks on a 16GB Mac mini running a local LLM</text>
  <g filter="url(#shadow2)"><rect x="420" y="300" width="360" height="140" rx="26" fill="#0F172A" stroke="#A78BFA" stroke-width="1.5"/><text x="470" y="350" fill="#A78BFA" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">CENTER</text><text x="470" y="392" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Mac mini M4 / 16GB / 256GB</text></g>
  <g filter="url(#shadow2)"><rect x="110" y="140" width="220" height="106" rx="22" fill="#111827" stroke="#38BDF8" stroke-width="1.5"/><text x="138" y="182" fill="#38BDF8" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">MODEL SIZE</text><text x="138" y="222" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Bigger is not always better</text></g>
  <g filter="url(#shadow2)"><rect x="874" y="140" width="220" height="106" rx="22" fill="#111827" stroke="#34D399" stroke-width="1.5"/><text x="902" y="182" fill="#34D399" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">CONTEXT LENGTH</text><text x="902" y="222" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Long context raises cost</text></g>
  <g filter="url(#shadow2)"><rect x="110" y="530" width="220" height="106" rx="22" fill="#111827" stroke="#F59E0B" stroke-width="1.5"/><text x="138" y="572" fill="#F59E0B" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">SSD SPACE</text><text x="138" y="612" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Weights eat disk quickly</text></g>
  <g filter="url(#shadow2)"><rect x="874" y="530" width="220" height="106" rx="22" fill="#111827" stroke="#FB7185" stroke-width="1.5"/><text x="902" y="572" fill="#FB7185" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">BACKGROUND APPS</text><text x="902" y="612" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Browsers and chat steal RAM</text></g>
