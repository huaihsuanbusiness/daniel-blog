<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1220 720">
<style>
text{font-family:Arial, sans-serif; fill:#223}.title{font-size:30px;font-weight:700}.h{font-size:15px;font-weight:700}.b{font-size:12px}.box{fill:#fff;stroke:#334155;stroke-width:1.6}.soft{fill:#f8fafc}
</style>
<text x="50" y="45" class="title">Channel Testing Plan: find pain + authority + action</text>
<rect x="60" y="80" width="160" height="95" class="box soft"/><text x="80" y="112" class="h">SEO</text><text x="80" y="142" class="b">Intent capture</text>
<rect x="240" y="80" width="160" height="95" class="box"/><text x="260" y="112" class="h">LinkedIn</text><text x="260" y="142" class="b">Decision makers</text>
<rect x="420" y="80" width="160" height="95" class="box soft"/><text x="440" y="112" class="h">Cold Email</text><text x="440" y="142" class="b">Outbound test</text>
<rect x="600" y="80" width="160" height="95" class="box"/><text x="620" y="112" class="h">Referral</text><text x="620" y="142" class="b">Trust transfer</text>
<rect x="780" y="80" width="160" height="95" class="box soft"/><text x="800" y="112" class="h">Partners</text><text x="800" y="142" class="b">Association / vendors</text>
<rect x="960" y="80" width="160" height="95" class="box"/><text x="980" y="112" class="h">Events</text><text x="980" y="142" class="b">High context sales</text>
<rect x="160" y="270" width="900" height="300" class="box"/>
<text x="190" y="310" class="h">Measure by behaviour, not exposure</text>
<text x="190" y="350" class="b">Reach → reply → qualified conversation → demo / pilot → paid test → referral</text>
<text x="190" y="390" class="b">A good channel repeatedly finds people with pain, authority and willingness to act.</text>
<text x="190" y="430" class="b">A bad channel creates attention from people who cannot or will not move.</text>
</svg>