<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">需求建立可以降低三種成本</title>
  <desc id="desc">需求建立可以降低三種成本：理解成本、信任成本、行動成本。</desc>
  <style>
text{font-family:'Noto Sans TC',Arial,sans-serif;fill:#1f2937}.bg{fill:#fbfaf7}.h{font-size:28px;font-weight:700;fill:#1e293b}.t{font-size:20px;font-weight:700;fill:#1e293b}.b{font-size:14px}.box{fill:#fff;stroke:#d1d5db;stroke-width:2;rx:16}.a{fill:#eff6ff;stroke:#93c5fd;stroke-width:2}.b{fill:#fff7ed;stroke:#fdba74;stroke-width:2}.c{fill:#f5f3ff;stroke:#c4b5fd;stroke-width:2}
  </style>
  <rect width="960" height="520" rx="24" fill="#fbfaf7"/>
  <text class="h" x="40" y="42">需求建立可以降低三種成本</text>
  <text class="b" x="40" y="66" fill="#64748b">目標不是更多內容。目標是降低切換、決定、行動的成本。</text>

  <rect class="a" x="40" y="88" width="880" height="120" rx="20"/>
  <text class="t" x="60" y="120">1. 理解成本</text>
  <text class="b" x="60" y="146">他們不理解你解決的是什麼問題。</text>
  <text class="b" x="60" y="168">透過讓問題具體、情境清楚、落差可測量，來降低這個成本。</text>

  <rect class="b" x="40" y="228" width="880" height="120" rx="20"/>
  <text class="t" x="60" y="260">2. 信任成本</text>
  <text class="b" x="60" y="286">他們還不相信你能交付。</text>
  <text class="b" x="60" y="308">在要求承諾之前先展示證據：社會證明、試用、數據、或推薦，來降低這個成本。</text>

  <rect class="c" x="40" y="368" width="880" height="120" rx="20"/>
  <text class="t" x="60" y="400">3. 行動成本</text>
  <text class="b" x="60" y="426">改變感覺太難，或不夠緊急。</text>
  <text class="b" x="60" y="448">透過降低第一步的門檻、讓期待的結果具體可觸及、減少「嘗試」所感受到的風險，來降低這個成本。</text>
</svg>
