<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">AIDAR 需求建立路徑</title>
  <desc id="desc">需求建立的五個階段：注意、興趣、欲望、行動、推薦。</desc>
  <defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/></marker></defs>
  <style>
text{font-family:'Noto Sans TC',Arial,sans-serif;fill:#1f2937}.bg{fill:#fbfaf7}.h{font-size:28px;font-weight:700;fill:#1e293b}.t{font-size:18px;font-weight:700;fill:#1e293b}.b{font-size:14px;fill:#475569}.box{fill:#fff;stroke:#d1d5db;stroke-width:2;rx:16}.a1{fill:#eff6ff;stroke:#93c5fd;stroke-width:2}.a2{fill:#f0fdf4;stroke:#86efac;stroke-width:2}.a3{fill:#fff7ed;stroke:#fdba74;stroke-width:2}.a4{fill:#f5f3ff;stroke:#c4b5fd;stroke-width:2}.a5{fill:#fff1f2;stroke:#fca5a5;stroke-width:2}
  </style>
  <rect width="960" height="520" rx="24" fill="#fbfaf7"/>
  <text class="h" x="40" y="40">AIDAR 需求建立路徑</text>
  <text class="b" x="40" y="64">需求建立可以降低三種成本：理解成本、信任成本、行動成本。</text>

  <rect class="a1" x="40" y="88" width="160" height="140" rx="18"/>
  <text class="t" x="52" y="116">Attention 注意</text>
  <text class="b" x="52" y="138">注意到問題的存在</text>
  <text class="b" x="52" y="158">如何讓顧客注意到？</text>
  <text class="b" x="52" y="178">讓問題變得可見。</text>

  <path d="M200 158 L225 158" stroke="#475569" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>

  <rect class="a2" x="225" y="88" width="160" height="140" rx="18"/>
  <text class="t" x="237" y="116">Interest 興趣</text>
  <text class="b" x="237" y="138">感覺到與自己相關</text>
  <text class="b" x="237" y="158">如何讓他們感受到這跟自己有關？</text>
  <text class="b" x="237" y="178">讓它具體到他們的情境。</text>

  <path d="M385 158 L410 158" stroke="#475569" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>

  <rect class="a3" x="410" y="88" width="160" height="140" rx="18"/>
  <text class="t" x="422" y="116">Desire 欲望</text>
  <text class="b" x="422" y="138">開始想要那個結果</text>
  <text class="b" x="422" y="158">如何讓他們開始渴望這個結果？</text>
  <text class="b" x="422" y="178">讓未來狀態具體可想像。</text>

  <path d="M570 158 L595 158" stroke="#475569" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>

  <rect class="a4" x="595" y="88" width="160" height="140" rx="18"/>
  <text class="t" x="607" y="116">Action 行動</text>
  <text class="b" x="607" y="138">採取下一步</text>
  <text class="b" x="607" y="158">他們如何邁出這一步？</text>
  <text class="b" x="607" y="178">降低行動的成本。</text>

  <path d="M755 158 L780 158" stroke="#475569" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>

  <rect class="a5" x="780" y="88" width="140" height="140" rx="18"/>
  <text class="t" x="792" y="116">Referral 推薦</text>
  <text class="b" x="792" y="138">邀請其他人</text>
  <text class="b" x="792" y="158">有了證據之後，如何讓他們推薦？</text>
  <text class="b" x="792" y="178">等證據清楚了再提出請求。</text>

  <rect class="box" x="40" y="260" width="880" height="220" rx="18"/>
  <text class="h" x="60" y="294">原則：每個階段需要不同的訊息、不同的證據、不同的行動成本降低方式。</text>
  <text class="b" x="60" y="322">需求建立不是把顧客推下漏斗。</text>
  <text class="b" x="60" y="344">而是每一步都給予足夠的理由，讓他們繼續前進。</text>
  <text class="b" x="60" y="372">它能降低的三種成本：</text>
  <text class="b" x="60" y="396">1. 理解成本 — 他們不理解你解決的是什麼問題。</text>
  <text class="b" x="60" y="418">2. 信任成本 — 他們還不相信你能交付。</text>
  <text class="b" x="60" y="440">3. 行動成本 — 改變感覺太難，或不夠緊急。</text>
</svg>
