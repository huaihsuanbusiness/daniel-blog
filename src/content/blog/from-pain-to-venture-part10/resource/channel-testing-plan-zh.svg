<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Channel Testing Plan 通路測試計畫</title>
  <desc id="desc">初期 90 天要測試的六條通路，以及各自的觸及、轉換品質與風險。</desc>
  <style>
text{font-family:'Noto Sans TC',Arial,sans-serif;fill:#1f2937}.bg{fill:#fbfaf7}.h{font-size:28px;font-weight:700;fill:#1e293b}.t{font-size:18px;font-weight:700;fill:#1e293b}.b{font-size:14px}.box{fill:#fff;stroke:#d1d5db;stroke-width:2;rx:14}.a{fill:#eff6ff;stroke:#93c5fd;stroke-width:2}.b{fill:#fff7ed;stroke:#fdba74;stroke-width:2}.c{fill:#f5f3ff;stroke:#c4b5fd;stroke-width:2}.d{fill:#f0fdf4;stroke:#86efac;stroke-width:2}.e{fill:#fff1f2;stroke:#fca5a5;stroke-width:2}
  </style>
  <rect width="960" height="560" rx="24" fill="#fbfaf7"/>
  <text class="h" x="40" y="42">Channel Testing Plan 通路測試計畫</text>
  <text class="b" x="40" y="66" fill="#64748b">初期 90 天要測試的六條通路。</text>

  <rect class="a" x="40" y="88" width="280" height="120" rx="16"/>
  <text class="t" x="52" y="120">SEO 搜尋引擎優化</text>
  <text class="b" x="52" y="144">意圖明確時捕獲流量</text>
  <text class="b" x="52" y="166">意圖高，但建立速度慢。</text>

  <rect class="b" x="340" y="88" width="280" height="120" rx="16"/>
  <text class="t" x="352" y="120">LinkedIn</text>
  <text class="b" x="352" y="144">決策者</text>
  <text class="b" x="352" y="166">B2B 適用，需要內容投資。</text>

  <rect class="c" x="640" y="88" width="280" height="120" rx="16"/>
  <text class="t" x="652" y="120">Cold Email 陌生開發信</text>
  <text class="b" x="652" y="144">外向測試</text>
  <text class="b" x="652" y="166">信號快，但沒有信任基礎轉換率低。</text>

  <rect class="d" x="40" y="228" width="280" height="120" rx="16"/>
  <text class="t" x="52" y="260">Referral 推薦</text>
  <text class="b" x="52" y="284">信任轉移</text>
  <text class="b" x="52" y="306">轉換率最高，但需要先有滿意的顧客。</text>

  <rect class="e" x="340" y="228" width="280" height="120" rx="16"/>
  <text class="t" x="352" y="260">Partners 合作夥伴</text>
  <text class="b" x="352" y="284">協會 / 廠商</text>
  <text class="b" x="352" y="306">能接觸現有顧客庫，但有依賴風險。</text>

  <rect class="a" x="640" y="228" width="280" height="120" rx="16"/>
  <text class="t" x="652" y="260">Events 實體活動</text>
  <text class="b" x="652" y="284">高情境銷售</text>
  <text class="b" x="652" y="306">昂貴，但複雜銷售最快建立信任。</text>

  <rect class="box" x="40" y="368" width="880" height="100" rx="18" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="2"/>
  <text class="t" x="60" y="402">通路順序</text>
  <text class="b" x="60" y="424">觸及 → 回覆 → qualified → demo → 付費 → 推薦</text>
  <text class="b" x="60" y="446">原則：在有可重複、有利潤的顧客獲取迴路之前，不要擴大任何一條通路。</text>
</svg>
