<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Agent Commerce Stack</title>
  <desc id="desc">A layered map showing where x402 fits among ACP, AP2, MPP, ERC-8004, MCP, discovery, wallet policy, accounting and compliance.</desc>
  <rect width="1200" height="675" fill="#f8fafc"/>
  <g font-family="Arial, Inter, sans-serif">
    <text x="600" y="50" text-anchor="middle" font-size="30" font-weight="700" fill="#0f172a">Agent Commerce Is a Stack, Not One Protocol</text>
    <text x="600" y="82" text-anchor="middle" font-size="16" fill="#475569">x402 is the paid request layer. The rest of commerce still needs authority, discovery, trust and operations.</text>

    <rect x="90" y="118" width="1020" height="60" rx="20" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="124" y="154" font-size="18" font-weight="700" fill="#075985">Tools / Actions</text>
    <text x="360" y="154" font-size="15" fill="#075985">How does the agent call external capabilities?</text>
    <text x="1045" y="154" text-anchor="end" font-size="14" font-weight="700" fill="#075985">MCP / A2A</text>

    <rect x="90" y="196" width="1020" height="60" rx="20" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="124" y="232" font-size="18" font-weight="700" fill="#713f12">Authority</text>
    <text x="360" y="232" font-size="15" fill="#713f12">Who allowed the agent to spend?</text>
    <text x="1045" y="232" text-anchor="end" font-size="14" font-weight="700" fill="#713f12">AP2 / mandates / wallet policy</text>

    <rect x="90" y="274" width="1020" height="60" rx="20" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="124" y="310" font-size="18" font-weight="700" fill="#4c1d95">Paid Request</text>
    <text x="360" y="310" font-size="15" fill="#4c1d95">How does one HTTP request carry payment proof?</text>
    <text x="1045" y="310" text-anchor="end" font-size="14" font-weight="700" fill="#4c1d95">x402</text>

    <rect x="90" y="352" width="1020" height="60" rx="20" fill="#fae8ff" stroke="#c026d3" stroke-width="2"/>
    <text x="124" y="388" font-size="18" font-weight="700" fill="#701a75">Payment Coordination</text>
    <text x="360" y="388" font-size="15" fill="#701a75">How do longer, recurring or high-frequency flows pay?</text>
    <text x="1045" y="388" text-anchor="end" font-size="14" font-weight="700" fill="#701a75">MPP / sessions / batching</text>

    <rect x="90" y="430" width="1020" height="60" rx="20" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="124" y="466" font-size="18" font-weight="700" fill="#14532d">Discovery + Trust</text>
    <text x="360" y="466" font-size="15" fill="#14532d">Which service should the agent find, rank and believe?</text>
    <text x="1045" y="466" text-anchor="end" font-size="14" font-weight="700" fill="#14532d">Bazaar / ERC-8004</text>

    <rect x="90" y="508" width="1020" height="60" rx="20" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="124" y="544" font-size="18" font-weight="700" fill="#7f1d1d">Commerce Operations</text>
    <text x="360" y="544" font-size="15" fill="#7f1d1d">Can we refund, reconcile, audit and comply?</text>
    <text x="1045" y="544" text-anchor="end" font-size="14" font-weight="700" fill="#7f1d1d">logs / disputes / accounting</text>

    <rect x="90" y="586" width="1020" height="50" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="124" y="617" font-size="17" font-weight="700" fill="#0f172a">Shopping / Checkout Note</text>
    <text x="360" y="617" font-size="14" fill="#475569">Product discovery, catalogue and purchase flows often sit closer to ACP than to x402.</text>
  </g>
</svg>
