<svg xmlns="http://www.w3.org/2000/svg" width="1420" height="860" viewBox="0 0 1420 860">
  <defs>
    <style>
      .t{font-family:Arial,Inter,sans-serif;fill:#1f2937}
      .h{font-size:28px;font-weight:700}
      .s{font-size:16px}
      .b{font-size:18px;font-weight:700}
      .n{font-size:14px}
      .box{stroke:#cbd5e1;stroke-width:2;rx:18;ry:18}
      .a{fill:#e0f2fe}.b1{fill:#ede9fe}.c{fill:#ffedd5}.d{fill:#dcfce7}.e{fill:#fee2e2}.f{fill:#fef3c7}
      .arrow{stroke:#64748b;stroke-width:2.5;fill:none;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#64748b"/></marker>
  </defs>
  <text x="60" y="60" class="t h">Glossary and layer map</text>
  <text x="60" y="92" class="t s">Common terms become much easier once they are returned to the layer they actually belong to.</text>
  <rect x="70" y="150" width="240" height="100" class="box a"/><text x="100" y="190" class="t b">Single request</text><text x="100" y="220" class="t n">user input / messages</text>
  <rect x="340" y="150" width="240" height="100" class="box b1"/><text x="370" y="190" class="t b">System / template</text><text x="370" y="220" class="t n">system prompt / chat template</text>
  <rect x="610" y="150" width="240" height="100" class="box c"/><text x="640" y="190" class="t b">Modelfile / packaging</text><text x="640" y="220" class="t n">FROM / PARAMETER / MESSAGE</text>
  <rect x="880" y="150" width="220" height="100" class="box d"/><text x="910" y="190" class="t b">Tokenizer</text><text x="910" y="220" class="t n">text → tokens</text>
  <rect x="1130" y="150" width="220" height="100" class="box e"/><text x="1160" y="190" class="t b">Model weights</text><text x="1160" y="220" class="t n">base / instruct</text>

  <rect x="250" y="430" width="240" height="100" class="box f"/><text x="280" y="470" class="t b">Adapter / LoRA</text><text x="280" y="500" class="t n">parameter increments</text>
  <rect x="560" y="430" width="240" height="100" class="box a"/><text x="590" y="470" class="t b">Training methods</text><text x="590" y="500" class="t n">SFT / DPO</text>
  <rect x="870" y="430" width="240" height="100" class="box b1"/><text x="900" y="470" class="t b">Merge / quantize</text><text x="900" y="500" class="t n">deployment shaping</text>
  <rect x="1180" y="430" width="180" height="100" class="box c"/><text x="1210" y="470" class="t b">Ollama</text><text x="1210" y="500" class="t n">local runtime</text>

  <path d="M310 250 L310 430" class="arrow"/>
  <path d="M700 250 L700 430" class="arrow"/>
  <path d="M1240 250 L1240 430" class="arrow"/>
  <path d="M490 480 H560" class="arrow"/>
  <path d="M800 480 H870" class="arrow"/>
  <path d="M1110 480 H1180" class="arrow"/>
</svg>