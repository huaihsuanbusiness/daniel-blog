<svg xmlns="http://www.w3.org/2000/svg" width="1260" height="590" viewBox="0 0 1260 590">
  <defs>
    <style>
      .title { font: 700 28px Inter, Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 14px Inter, Arial, sans-serif; fill: #475569; }
      .line { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #94a3b8; stroke-width: 2; fill: none; stroke-dasharray: 6 6; marker-end: url(#arrow); }
      .note { font: 12px Inter, Arial, sans-serif; fill: #64748b; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1260" height="590" fill="#f8fafc"/>
  <text x="48" y="52" class="title">Rollout checklist</text>
  <text x="48" y="78" class="subtitle">Treat the deployment as a staged release, not a single heroic leap.</text>
  <rect x="55" y="180" width="200" height="150" rx="18" ry="18" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
<text x="75" y="210" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Network</text>
<text x="75" y="235" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">public IP</text>
<text x="75" y="255" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">IGW route</text>
<text x="75" y="275" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">22/443 rules</text>
<path class="line" d="M255 255 H300"/>
<rect x="300" y="180" width="200" height="150" rx="18" ry="18" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.5"/>
<text x="320" y="210" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">App</text>
<text x="320" y="235" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">venv ready</text>
<text x="320" y="255" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">app imports</text>
<text x="320" y="275" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">local /mcp responds</text>
<path class="line" d="M500 255 H545"/>
<rect x="545" y="180" width="200" height="150" rx="18" ry="18" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
<text x="565" y="210" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Service</text>
<text x="565" y="235" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">systemd enabled</text>
<text x="565" y="255" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">restarts cleanly</text>
<text x="565" y="275" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">logs visible</text>
<path class="line" d="M745 255 H790"/>
<rect x="790" y="180" width="200" height="150" rx="18" ry="18" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
<text x="810" y="210" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Proxy</text>
<text x="810" y="235" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">nginx -t</text>
<text x="810" y="255" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">443 serving</text>
<text x="810" y="275" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">path proxy aligns</text>
<path class="line" d="M990 255 H1035"/>
<rect x="1035" y="180" width="200" height="150" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
<text x="1055" y="210" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Host integration</text>
<text x="1055" y="235" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">public HTTPS works</text>
<text x="1055" y="255" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">tool discovery works</text>
<text x="1055" y="275" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">surface is clean</text>
<rect x="250" y="410" width="640" height="120" rx="18" ry="18" fill="#fff1f2" stroke="#fda4af" stroke-width="1.5"/>
<text x="270" y="440" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Do not skip the order</text>
<text x="270" y="465" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">Passing ChatGPT connectivity without passing infrastructure smoke tests first makes debugging dramatically slower.</text>
</svg>