<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="760" viewBox="0 0 1320 760">
  <defs>
    <style>
      .title { font: 700 28px Arial, Inter, sans-serif; fill: #1f2937; }
      .subtitle { font: 400 15px Arial, Inter, sans-serif; fill: #6b7280; }
      .label { font: 700 17px Arial, Inter, sans-serif; fill: #1f2937; }
      .body { font: 400 14px Arial, Inter, sans-serif; fill: #374151; }
      .small { font: 400 12px Arial, Inter, sans-serif; fill: #6b7280; }
      .box { stroke: #cbd5e1; stroke-width: 1.5; rx: 18; ry: 18; }
      .arrow { stroke: #64748b; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
      .soft { fill: #ffffff; }
      .hub { fill: #dbeafe; }
      .logic { fill: #ffedd5; }
      .router { fill: #ede9fe; }
      .data { fill: #e0f2fe; }
      .runtime { fill: #dcfce7; }
      .note { fill: #f8fafc; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>

  <text x="60" y="62" class="title">Local LLM Fine-Tuning Toolchain</text>
  <text x="60" y="90" class="subtitle">Who does what before, during, and after fine-tuning</text>

  <!-- Top row -->
  <rect x="60" y="150" width="180" height="120" class="box hub"/>
  <text x="84" y="185" class="label">Hugging Face Hub</text>
  <text x="84" y="213" class="body">Model hosting</text>
  <text x="84" y="235" class="body">Access & gating</text>
  <text x="84" y="257" class="body">Model cards & files</text>

  <rect x="280" y="150" width="190" height="120" class="box soft"/>
  <text x="309" y="185" class="label">Transformers</text>
  <text x="309" y="213" class="body">Load models</text>
  <text x="309" y="235" class="body">Load tokenizer</text>
  <text x="309" y="257" class="body">Inference & Trainer base</text>

  <rect x="510" y="150" width="170" height="120" class="box logic"/>
  <text x="550" y="185" class="label">PEFT</text>
  <text x="538" y="213" class="body">Attach LoRA / adapters</text>
  <text x="538" y="235" class="body">Parameter-efficient</text>
  <text x="538" y="257" class="body">fine-tuning layer</text>

  <rect x="720" y="150" width="170" height="120" class="box router"/>
  <text x="776" y="185" class="label">TRL</text>
  <text x="748" y="213" class="body">SFTTrainer</text>
  <text x="748" y="235" class="body">DPOTrainer</text>
  <text x="748" y="257" class="body">Post-training methods</text>

  <rect x="930" y="150" width="190" height="120" class="box soft"/>
  <text x="962" y="185" class="label">Artifacts</text>
  <text x="962" y="213" class="body">Adapter weights</text>
  <text x="962" y="235" class="body">Merged safetensors</text>
  <text x="962" y="257" class="body">Training outputs</text>

  <rect x="1160" y="150" width="120" height="120" class="box runtime"/>
  <text x="1185" y="185" class="label">Ollama</text>
  <text x="1184" y="213" class="body">Run</text>
  <text x="1184" y="235" class="body">Package</text>
  <text x="1184" y="257" class="body">Deploy</text>

  <!-- Arrows top -->
  <path d="M240 210 H280" class="arrow"/>
  <path d="M470 210 H510" class="arrow"/>
  <path d="M680 210 H720" class="arrow"/>
  <path d="M890 210 H930" class="arrow"/>
  <path d="M1120 210 H1160" class="arrow"/>

  <!-- Bottom row -->
  <rect x="240" y="360" width="270" height="120" class="box data"/>
  <text x="274" y="395" class="label">Tokenizer / Chat Template</text>
  <text x="274" y="423" class="body">Input protocol layer</text>
  <text x="274" y="445" class="body">Role formatting & generation prompt</text>
  <text x="274" y="467" class="body">Wrong template can quietly degrade quality</text>

  <rect x="580" y="360" width="250" height="120" class="box data"/>
  <text x="668" y="395" class="label">Datasets</text>
  <text x="606" y="423" class="body">Load, split, map, cache</text>
  <text x="606" y="445" class="body">Training data engineering layer</text>
  <text x="606" y="467" class="body">Often where “model bugs” actually start</text>

  <!-- connectors -->
  <path d="M375 360 V270" class="arrow"/>
  <path d="M705 360 V270" class="arrow"/>

  <path d="M510 420 H580" class="arrow"/>
  <path d="M830 420 V270" class="arrow"/>

  <!-- notes -->
  <rect x="60" y="565" width="1220" height="125" class="box note"/>
  <text x="90" y="602" class="label">How to read this stack</text>
  <text x="90" y="632" class="body">1. Hub = where models and permissions live.</text>
  <text x="90" y="655" class="body">2. Transformers = the main interface to models and tokenizers.</text>
  <text x="90" y="678" class="body">3. PEFT + TRL = where LoRA, SFT, and DPO workflows become practical.</text>

  <text x="650" y="632" class="body">4. Datasets + tokenizer/template are not side details. They shape training quality.</text>
  <text x="650" y="655" class="body">5. Ollama sits closer to runtime and packaging than to the actual training loop.</text>
  <text x="650" y="678" class="body">6. Most “model problems” are actually boundary problems somewhere in this chain.</text>
</svg>
