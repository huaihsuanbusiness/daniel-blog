<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760">
  <defs>
    <style>
      text { font-family: Arial, Inter, sans-serif; fill: #233043; }
      .title { font-size: 28px; font-weight: 700; }
      .subtitle { font-size: 15px; fill: #5b6b7f; }
      .box { stroke: #8393a7; stroke-width: 2; rx: 22; ry: 22; }
      .h { font-size: 20px; font-weight: 700; }
      .p { font-size: 15px; }
      .arrow { stroke: #6c7ea0; stroke-width: 3; fill: none; marker-end: url(#m); }
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#6c7ea0"/></marker>
  </defs>
  <text x="60" y="56" class="title">Local LLM layer map</text>
  <text x="60" y="84" class="subtitle">From request-time steering to adapters and base weights</text>
  <rect x="60" y="120" width="1080" height="90" class="box" fill="#eef6ff"/>
  <text x="90" y="156" class="h">Single request</text>
  <text x="90" y="184" class="p">Ad hoc instruction for this turn. Fast, cheap, short-lived.</text>
  <rect x="60" y="230" width="1080" height="110" class="box" fill="#f6f2ff"/>
  <text x="90" y="268" class="h">System / template / messages / parameters</text>
  <text x="90" y="298" class="p">Director note, screenplay format, sample performances, and runtime settings.</text>
  <text x="90" y="323" class="p">These shape behaviour without rewriting the model’s underlying knowledge.</text>
  <rect x="60" y="360" width="1080" height="110" class="box" fill="#fff6ea"/>
  <text x="90" y="398" class="h">Modelfile</text>
  <text x="90" y="428" class="p">Packaging blueprint that can stabilise base, template, system, messages, and parameters.</text>
  <rect x="60" y="490" width="1080" height="110" class="box" fill="#fdeff3"/>
  <text x="90" y="528" class="h">Adapter / LoRA</text>
  <text x="90" y="558" class="p">Parameter-efficient behavioural adjustment. More durable than prompting, cheaper than full fine-tuning.</text>
  <rect x="60" y="620" width="1080" height="90" class="box" fill="#edf4ef"/>
  <text x="90" y="656" class="h">Base model weights</text>
  <text x="90" y="684" class="p">The actor’s underlying brain and prior training: language ability, dialogue habits, and model balance.</text>
  <path d="M600 210 L600 230" class="arrow"/>
  <path d="M600 340 L600 360" class="arrow"/>
  <path d="M600 470 L600 490" class="arrow"/>
  <path d="M600 600 L600 620" class="arrow"/>
</svg>