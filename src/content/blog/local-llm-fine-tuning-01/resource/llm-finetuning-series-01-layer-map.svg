<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1080" role="img" aria-labelledby="title desc">
  <title id="title">Local LLM layer map</title>
  <desc id="desc">A layered map showing Single Request, System Prompt, Modelfile, LoRA or Adapter, and Base Model Weights, with film-set analogies on the right.</desc>
  <defs>
    <style>
      text { font-family: Arial, Inter, sans-serif; fill: #1f2937; }
      .title { font-size: 28px; font-weight: 700; }
      .subtitle { font-size: 15px; fill: #4b5563; }
      .layer-title { font-size: 22px; font-weight: 700; }
      .layer-body { font-size: 15px; fill: #374151; }
      .chip { font-size: 14px; fill: #475569; }
      .box { stroke: #cbd5e1; stroke-width: 1.6; rx: 24; ry: 24; }
      .arrow { stroke: #94a3b8; stroke-width: 2.4; fill: none; marker-end: url(#m); }
      .note { stroke: #e2e8f0; stroke-width: 1.2; rx: 16; ry: 16; fill: #ffffff; }
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="960" height="1080" fill="#f8fafc"/>
  <text x="60" y="62" class="title">Local LLM Layer Map</text>
  <text x="60" y="92" class="subtitle">From outer prompt control to inner model parameters</text>
  <rect class="box" x="60" y="130" width="520" height="122" fill="#ecfccb"/>
  <text x="92" y="174" class="layer-title">1. Single Request</text>
  <text x="92" y="206" class="layer-body">The prompt you type for this turn.</text>
  <text x="92" y="230" class="layer-body">Fastest to change. Cheapest to try. Least stable.</text>
  <rect class="note" x="640" y="150" width="250" height="82"/>
  <text x="668" y="185" class="chip">Film-set analogy</text>
  <text x="668" y="212" class="layer-body">Today's lines for the scene</text>
  <rect class="box" x="60" y="280" width="520" height="122" fill="#dbeafe"/>
  <text x="92" y="324" class="layer-title">2. System Prompt</text>
  <text x="92" y="356" class="layer-body">Role, tone and behavioural defaults.</text>
  <text x="92" y="380" class="layer-body">Stronger than one-off prompting, still outer packaging.</text>
  <rect class="note" x="640" y="300" width="250" height="82"/>
  <text x="668" y="335" class="chip">Film-set analogy</text>
  <text x="668" y="362" class="layer-body">Director's note</text>
  <rect class="box" x="60" y="430" width="520" height="162" fill="#fae8ff"/>
  <text x="92" y="474" class="layer-title">3. Modelfile</text>
  <text x="92" y="506" class="layer-body">Packaging blueprint around the model:</text>
  <text x="92" y="530" class="layer-body">FROM, SYSTEM, TEMPLATE, MESSAGE, PARAMETER, ADAPTER</text>
  <text x="92" y="554" class="layer-body">Big effect on feel without necessarily changing weights.</text>
  <rect class="note" x="640" y="470" width="250" height="82"/>
  <text x="668" y="505" class="chip">Film-set analogy</text>
  <text x="668" y="532" class="layer-body">Production plan</text>
  <rect class="box" x="60" y="620" width="520" height="142" fill="#ffedd5"/>
  <text x="92" y="664" class="layer-title">4. LoRA / Adapter</text>
  <text x="92" y="696" class="layer-body">Trainable habit layer attached to the base model.</text>
  <text x="92" y="720" class="layer-body">Deeper than prompting. Cheaper than full fine-tuning.</text>
  <rect class="note" x="640" y="650" width="250" height="82"/>
  <text x="668" y="685" class="chip">Film-set analogy</text>
  <text x="668" y="712" class="layer-body">Muscle memory retraining</text>
  <rect class="box" x="60" y="800" width="520" height="162" fill="#fee2e2"/>
  <text x="92" y="844" class="layer-title">5. Base Model Weights</text>
  <text x="92" y="876" class="layer-body">The model's core parameters:</text>
  <text x="92" y="900" class="layer-body">language ability, instruction behaviour, deep priors</text>
  <text x="92" y="924" class="layer-body">Deepest layer. Most expensive to touch. Easiest to damage.</text>
  <rect class="note" x="640" y="840" width="250" height="82"/>
  <text x="668" y="875" class="chip">Film-set analogy</text>
  <text x="668" y="902" class="layer-body">Actor's brain and training base</text>
  <path class="arrow" d="M320 252 L320 280"/>
  <path class="arrow" d="M320 402 L320 430"/>
  <path class="arrow" d="M320 592 L320 620"/>
  <path class="arrow" d="M320 762 L320 800"/>
  <rect x="60" y="986" width="830" height="54" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.2" rx="18" ry="18"/>
  <text x="88" y="1019" class="layer-body">Rule of thumb: the deeper you go, the more durable the change can be — but the higher the cost and the higher the risk of damaging the base model.</text>
</svg>