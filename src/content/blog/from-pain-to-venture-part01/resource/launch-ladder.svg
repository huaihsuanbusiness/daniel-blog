<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 760" role="img" aria-labelledby="title desc">
  <title id="title">Launch narrative ladder</title>
  <desc id="desc">A six-step ladder for turning a customer gap into a launch thesis.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10z" fill="#475569"/></marker>
    <style>.bg{fill:#fbfaf7}.card{fill:#fff;stroke:#d6d3d1;stroke-width:2}.num{fill:#0f172a;font:700 18px Arial}.h{fill:#1e293b;font:700 24px Arial}.t{fill:#334155;font:17px Arial}.s{fill:#64748b;font:14px Arial}.arrow{stroke:#475569;stroke-width:2.2;fill:none;marker-end:url(#arrow)}</style>
  </defs>
  <rect class="bg" width="1100" height="760" rx="28"/>
  <text class="h" x="56" y="60">Launch thesis ladder: how the value story becomes concrete</text>
  <text class="s" x="56" y="90">從特定情境、重大期許落差，到專門解法與根本改變。</text>
  <g transform="translate(70,130)">
    <rect class="card" x="0" y="0" width="960" height="74" rx="18"/><text class="num" x="28" y="45">1</text><text class="t" x="72" y="45">當事人在什麼特定情境下，要完成什麼事情？</text>
    <path class="arrow" d="M480 78 V108"/>
    <rect class="card" x="0" y="112" width="960" height="74" rx="18"/><text class="num" x="28" y="157">2</text><text class="t" x="72" y="157">未能滿足的重大期許是什麼？</text>
    <path class="arrow" d="M480 190 V220"/>
    <rect class="card" x="0" y="224" width="960" height="84" rx="18"/><text class="num" x="28" y="271">3</text><text class="t" x="72" y="257">這個期許落差沒有被滿足時，當事人付出什麼代價，承擔什麼後果？</text>
    <path class="arrow" d="M480 312 V342"/>
    <rect class="card" x="0" y="346" width="960" height="84" rx="18"/><text class="num" x="28" y="393">4</text><text class="t" x="72" y="379">如果落差被處理，會創造什麼價值？後續可能發展出什麼意圖？</text>
    <path class="arrow" d="M480 434 V464"/>
    <rect class="card" x="0" y="468" width="960" height="84" rx="18"/><text class="num" x="28" y="515">5</text><text class="t" x="72" y="501">哪一種專門解決方案，能化解背後落差，讓重大期許落差不再存在？</text>
    <path class="arrow" d="M480 556 V586"/>
    <rect class="card" x="0" y="590" width="960" height="84" rx="18"/><text class="num" x="28" y="637">6</text><text class="t" x="72" y="623">當事人或環境在哪個層面產生根本改變？</text>
  </g>
</svg>
