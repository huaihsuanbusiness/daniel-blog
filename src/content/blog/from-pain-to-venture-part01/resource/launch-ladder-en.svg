<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">Launch Thesis Ladder</title>
  <desc id="desc">A six-step ladder for turning a customer gap into a launch thesis.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      .bg{fill:#fbfaf7}.step{fill:#eff6ff;stroke:#93c5fd;stroke-width:2}.step_dark{fill:#f5f3ff;stroke:#c4b5fd;stroke-width:2}.num{font:700 22px Arial,sans-serif;fill:#1e293b}.title{font:700 16px Arial,sans-serif;fill:#1e293b}.body{font:14px Arial,sans-serif;fill:#475569}.arrow{stroke:#475569;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="960" height="600" rx="24"/>
  <text class="title" x="40" y="44" font-size="22px" font-weight="700" fill="#1e293b">Launch Thesis Ladder</text>
  <text class="body" x="40" y="70" font-size="14px">From a specific situation and expectation gap, to a focused solution and fundamental change.</text>

  <rect class="step" x="40" y="100" width="880" height="64" rx="16"/>
  <text class="num" x="60" y="136">1</text>
  <text class="title" x="100" y="125">Situation</text>
  <text class="body" x="100" y="145">In what specific situation does the actor need to complete what?</text>

  <path class="arrow" d="M480 164 V188"/>

  <rect class="step" x="40" y="188" width="880" height="64" rx="16"/>
  <text class="num" x="60" y="224">2</text>
  <text class="title" x="100" y="213">Expectation Gap</text>
  <text class="body" x="100" y="233">What important expectation has not been met?</text>

  <path class="arrow" d="M480 252 V276"/>

  <rect class="step" x="40" y="276" width="880" height="64" rx="16"/>
  <text class="num" x="60" y="312">3</text>
  <text class="title" x="100" y="301">Cost &amp; Consequence</text>
  <text class="body" x="100" y="321">When this gap is not met, what does the actor pay or endure?</text>

  <path class="arrow" d="M480 340 V364"/>

  <rect class="step" x="40" y="364" width="880" height="64" rx="16"/>
  <text class="num" x="60" y="400">4</text>
  <text class="title" x="100" y="389">Value Created</text>
  <text class="body" x="100" y="409">If the gap is resolved, what value is created? What intentions or developments might follow?</text>

  <path class="arrow" d="M480 428 V452"/>

  <rect class="step" x="40" y="452" width="880" height="64" rx="16"/>
  <text class="num" x="60" y="488">5</text>
  <text class="title" x="100" y="477">Focused Solution</text>
  <text class="body" x="100" y="497">Which specific solution can dissolve the gap and make the expectation gap disappear?</text>

  <path class="arrow" d="M480 516 V540"/>

  <rect class="step_dark" x="40" y="540" width="880" height="48" rx="16"/>
  <text class="num" x="60" y="570">6</text>
  <text class="title" x="100" y="562">Fundamental Change</text>
  <text class="body" x="100" y="580">At what level does the actor or environment fundamentally change?</text>
</svg>
