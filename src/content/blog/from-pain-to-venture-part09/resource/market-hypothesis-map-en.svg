<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Market Hypothesis Map</title>
  <desc id="desc">Five market dimensions to validate before overbuilding: customer segments, market scale, competition, positioning, and core question.</desc>
  <style>
text{font-family:Arial,sans-serif;fill:#1f2937}.bg{fill:#fbfaf7}.h{font-size:28px;font-weight:700;fill:#1e293b}.t{font-size:18px;font-weight:700;fill:#1e293b}.b{font-size:14px}.box{fill:#fff;stroke:#d1d5db;stroke-width:2;rx:16}.blue{fill:#eff6ff;stroke:#93c5fd;stroke-width:2}.yellow{fill:#fff7ed;stroke:#fdba74;stroke-width:2}.red{fill:#fff1f2;stroke:#fca5a5;stroke-width:2}.green{fill:#f0fdf4;stroke:#86efac;stroke-width:2}
  </style>
  <rect width="960" height="560" rx="24" fill="#fbfaf7"/>
  <text class="h" x="40" y="42">Market Hypothesis Map</text>
  <text class="b" x="40" y="66" fill="#64748b">Five market dimensions to validate before overbuilding.</text>

  <rect class="blue" x="40" y="88" width="420" height="120" rx="18"/>
  <text class="t" x="60" y="120">Customer Segments</text>
  <text class="b" x="60" y="146">Who has the urgent job? What buying factors matter?</text>
  <text class="b" x="60" y="168">SOM focus — not TAM. Who moves first?</text>

  <rect class="yellow" x="480" y="88" width="420" height="120" rx="18"/>
  <text class="t" x="500" y="120">Market Scale</text>
  <text class="b" x="500" y="146">TAM / SAM / SOM · growth · timing</text>
  <text class="b" x="500" y="168">TAM is ambition. SOM is the first hill. Early on, SOM matters most.</text>

  <rect class="red" x="40" y="228" width="420" height="120" rx="18"/>
  <text class="t" x="60" y="260">Competition</text>
  <text class="b" x="60" y="286">Direct · indirect · substitutes · status quo · workarounds</text>
  <text class="b" x="60" y="308">The scariest competitor is often the status quo.</text>

  <rect class="green" x="480" y="228" width="420" height="120" rx="18"/>
  <text class="t" x="500" y="260">Positioning</text>
  <text class="b" x="500" y="286">Category · difference · why now?</text>
  <text class="b" x="500" y="308">Positioning is not a slogan. It is a place in the customer's mind.</text>

  <rect class="box" x="40" y="368" width="880" height="100" rx="18" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="2"/>
  <text class="t" x="60" y="402">Core question</text>
  <text class="b" x="60" y="424">Are we entering a reachable, growing, budgeted market where the customer has a reason to switch now?</text>
  <text class="b" x="60" y="446">If the answer to any of the five dimensions is uncertain — go back to validation before building.</text>
</svg>
