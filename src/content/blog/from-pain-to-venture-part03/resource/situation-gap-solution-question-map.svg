<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#555"/></marker>
  <style>text{font-family:Arial,'Noto Sans TC',sans-serif;fill:#1f2937}.title{font-size:32px;font-weight:700}.sub{font-size:18px;fill:#4b5563}.box{fill:#fff;stroke:#d1d5db;stroke-width:2}.head{font-size:22px;font-weight:700}.body{font-size:17px;fill:#374151}.tag{font-size:15px;fill:#6b7280}</style></defs>
  <rect width="1200" height="720" fill="#fafafa"/>
  <text x="60" y="70" class="title">Situation → Gap → Solution Question Map</text>
  <text x="60" y="105" class="sub">訪談前先排問題順序：先看情境，再看落差，最後才談解法。</text>
  <rect x="60" y="160" width="320" height="390" rx="24" class="box"/>
  <text x="90" y="205" class="head">A. Situation</text>
  <text x="90" y="245" class="body">1. 當事人的情境是什麼？</text>
  <text x="90" y="280" class="body">2. 他關切什麼事情？</text>
  <text x="90" y="315" class="body">3. 他要完成什麼工作？</text>
  <text x="90" y="350" class="body">4. 理想狀況是什麼？</text>
  <text x="90" y="385" class="body">5. 期待結果是什麼？</text>
  <text x="90" y="445" class="tag">Focus: context, JTBD, outcome</text>
  <rect x="440" y="160" width="320" height="390" rx="24" class="box"/>
  <text x="470" y="205" class="head">B. Gap</text>
  <text x="470" y="245" class="body">6. 哪些期待未被滿足？</text>
  <text x="470" y="280" class="body">7. 他試過什麼卻沒效？</text>
  <text x="470" y="315" class="body">8. 付出什麼代價？</text>
  <text x="470" y="350" class="body">9. 現有解法哪裡不夠？</text>
  <text x="470" y="385" class="body">10. 解決後會帶來什麼？</text>
  <text x="470" y="445" class="tag">Focus: important unfulfilled, cost</text>
  <rect x="820" y="160" width="320" height="390" rx="24" class="box"/>
  <text x="850" y="205" class="head">C. Solution</text>
  <text x="850" y="245" class="body">11. 必須面對哪些挑戰？</text>
  <text x="850" y="280" class="body">12. 提供什麼走向理想？</text>
  <text x="850" y="315" class="body">13. 帶來什麼根本改變？</text>
  <text x="850" y="350" class="body">14. 關鍵突破是什麼？</text>
  <text x="850" y="385" class="body">15-19. KPI / MVP / 驗證</text>
  <text x="850" y="445" class="tag">Focus: leverage point, MVP</text>
  <line x1="385" y1="355" x2="430" y2="355" stroke="#555" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="765" y1="355" x2="810" y2="355" stroke="#555" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="60" y="600" width="1080" height="60" rx="18" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="90" y="638" class="body">Rule: 不要用訪談替 solution 找背書。先確認情境與 Gap 是否站得住，再談 solution 和 MVP。</text>
</svg>
