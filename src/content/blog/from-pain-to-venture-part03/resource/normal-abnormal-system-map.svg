<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs><style>text{font-family:Arial,'Noto Sans TC',sans-serif;fill:#1f2937}.title{font-size:32px;font-weight:700}.sub{font-size:18px;fill:#4b5563}.box{fill:#fff;stroke:#d1d5db;stroke-width:2}.head{font-size:22px;font-weight:700}.body{font-size:17px;fill:#374151}.small{font-size:15px;fill:#6b7280}</style></defs>
  <rect width="1200" height="760" fill="#fafafa"/>
  <text x="60" y="70" class="title">Normal System vs. Abnormal System</text>
  <text x="60" y="105" class="sub">先理解正常狀態如何運作，再判斷不正常狀態如何形成。</text>
  <rect x="60" y="150" width="500" height="470" rx="24" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="2"/>
  <text x="95" y="200" class="head">Normal System</text>
  <text x="95" y="245" class="body">旅宿能獲得新客，也能在入住後</text>
  <text x="95" y="275" class="body">累積信任、資料、關係與回訪機會。</text>
  <text x="95" y="330" class="body">OTA 是通路之一，</text>
  <text x="95" y="360" class="body">但不是唯一的顧客入口。</text>
  <text x="95" y="430" class="small">問法：</text>
  <text x="95" y="460" class="small">・正常系統是什麼？</text>
  <text x="95" y="485" class="small">・它的功用是什麼？</text>
  <text x="95" y="510" class="small">・誰從中受益？</text>
  <rect x="640" y="150" width="500" height="470" rx="24" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
  <text x="675" y="200" class="head">Abnormal System</text>
  <text x="675" y="245" class="body">旅宿拿到訂單，</text>
  <text x="675" y="275" class="body">但顧客關係主要被平台掌握。</text>
  <text x="675" y="330" class="body">旅客退房後，</text>
  <text x="675" y="360" class="body">很難變成回訪、推薦或品牌關係。</text>
  <text x="675" y="430" class="small">問法：</text>
  <text x="675" y="460" class="small">・不正常系統怎麼來？</text>
  <text x="675" y="485" class="small">・造成什麼代價？</text>
  <text x="675" y="510" class="small">・現有方法為何不夠？</text>
  <rect x="180" y="665" width="840" height="48" rx="16" fill="#f3f4f6" stroke="#e5e7eb"/>
  <text x="220" y="697" class="body">Goal: 不只是說「旅宿想降低 OTA 依賴」，而是看見顧客關係系統如何失衡。</text>
</svg>
