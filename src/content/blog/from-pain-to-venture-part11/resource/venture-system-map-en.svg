<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 860" role="img" aria-labelledby="title desc">
  <title id="title">Venture System Map</title>
  <desc id="desc">A venture system shown as eight coordinated layers: Product, Operation, Resources, Partners, Team and Culture, Finance, Risk, and Decision Rule.</desc>
  <style>
    text { font-family: Arial, sans-serif; }
    .title { font-size: 30px; font-weight: 700; fill: #1e293b; }
    .sub { font-size: 16px; fill: #64748b; }
    .card-title { font-size: 18px; font-weight: 700; fill: #1e293b; }
    .card-body { font-size: 15px; fill: #1e293b; }
    .center-title { font-size: 22px; font-weight: 700; fill: #1e293b; }
    .center-body { font-size: 15px; fill: #1e293b; }
    .footer { font-size: 16px; fill: #1e293b; }
    .card { fill: #fff; stroke: #d1d5db; stroke-width: 2; rx: 18; }
    .blue { fill: #eff6ff; stroke: #93c5fd; }
    .green { fill: #f0fdf4; stroke: #86efac; }
    .orange { fill: #fff7ed; stroke: #fdba74; }
    .purple { fill: #f5f3ff; stroke: #c4b5fd; }
    .red { fill: #fff1f2; stroke: #fca5a5; }
    .line { stroke: #94a3b8; stroke-width: 2.5; }
  </style>

  <rect width="1100" height="860" rx="30" fill="#fbfaf7"/>
  <text class="title" x="40" y="48">Venture System Map</text>
  <text class="sub" x="40" y="74">A product is visible. A venture is the operating system behind it.</text>

  <!-- top row -->
  <rect class="card blue" x="70" y="110" width="280" height="120" rx="18"/>
  <text class="card-title" x="92" y="140">Product</text>
  <text class="card-body" x="92" y="168">What does the customer see, use,</text>
  <text class="card-body" x="92" y="190">and judge directly?</text>

  <rect class="card orange" x="390" y="110" width="320" height="120" rx="18"/>
  <text class="card-title" x="412" y="140">Operation</text>
  <text class="card-body" x="412" y="168">What must happen every day</text>
  <text class="card-body" x="412" y="190">for value to be delivered?</text>

  <rect class="card purple" x="750" y="110" width="280" height="120" rx="18"/>
  <text class="card-title" x="772" y="140">Resources</text>
  <text class="card-body" x="772" y="168">What people, capital, data,</text>
  <text class="card-body" x="772" y="190">tools, and trust are required?</text>

  <!-- middle left/right -->
  <rect class="card green" x="70" y="300" width="280" height="130" rx="18"/>
  <text class="card-title" x="92" y="332">Partners</text>
  <text class="card-body" x="92" y="360">Which outside relationships reduce</text>
  <text class="card-body" x="92" y="382">cost, increase reach, or enable delivery?</text>

  <rect class="card" x="360" y="280" width="380" height="190" rx="22" fill="#ffffff"/>
  <text class="center-title" x="385" y="324">Venture System</text>
  <text class="center-body" x="385" y="356">This is the whole machine that creates, delivers,</text>
  <text class="center-body" x="385" y="380">and captures value repeatedly.</text>
  <text class="center-body" x="385" y="414">If one layer breaks, the product may still look good,</text>
  <text class="center-body" x="385" y="438">but the business becomes fragile.</text>

  <rect class="card blue" x="750" y="300" width="280" height="130" rx="18"/>
  <text class="card-title" x="772" y="332">Finance</text>
  <text class="card-body" x="772" y="360">How do cash, margin, payback,</text>
  <text class="card-body" x="772" y="382">and runway behave?</text>

  <!-- lower row -->
  <rect class="card orange" x="70" y="520" width="300" height="130" rx="18"/>
  <text class="card-title" x="92" y="552">Team / Culture</text>
  <text class="card-body" x="92" y="580">Who does the work?</text>
  <text class="card-body" x="92" y="602">How do they learn, coordinate, and react</text>
  <text class="card-body" x="92" y="624">when reality contradicts the plan?</text>

  <rect class="card red" x="400" y="520" width="300" height="130" rx="18"/>
  <text class="card-title" x="422" y="552">Risk</text>
  <text class="card-body" x="422" y="580">What could break the model?</text>
  <text class="card-body" x="422" y="602">What dependencies, bottlenecks, or</text>
  <text class="card-body" x="422" y="624">failure modes must be watched?</text>

  <rect class="card purple" x="730" y="520" width="300" height="130" rx="18"/>
  <text class="card-title" x="752" y="552">Decision Rule</text>
  <text class="card-body" x="752" y="580">When do we continue, pivot, pause,</text>
  <text class="card-body" x="752" y="602">or stop?</text>
  <text class="card-body" x="752" y="624">What evidence changes the next move?</text>

  <!-- connector lines -->
  <line class="line" x1="350" y1="170" x2="390" y2="170"/>
  <line class="line" x1="710" y1="170" x2="750" y2="170"/>
  <line class="line" x1="350" y1="365" x2="360" y2="365"/>
  <line class="line" x1="740" y1="365" x2="750" y2="365"/>
  <line class="line" x1="370" y1="585" x2="400" y2="585"/>
  <line class="line" x1="700" y1="585" x2="730" y2="585"/>
  <line class="line" x1="550" y1="230" x2="550" y2="280"/>
  <line class="line" x1="550" y1="470" x2="550" y2="520"/>

  <rect class="card" x="70" y="700" width="960" height="90" rx="20" fill="#ffffff"/>
  <text class="footer" x="94" y="738">System question: Can this venture repeatedly create, deliver, and capture value without the system collapsing?</text>
  <text class="sub" x="94" y="766">A product may attract attention. A venture system determines whether the business survives long enough to matter.</text>
</svg>
