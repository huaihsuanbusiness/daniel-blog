<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" role="img" aria-labelledby="title desc">
  <title id="title">Venture System Map</title>
  <desc id="desc">Seven interlocking components of a venture: Value Proposition, Key Activities, Key Resources, Key Partners, Team/Culture, Finance, and Risk Register.</desc>
  <defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/></marker></defs>
  <style>
text{font-family:Arial,sans-serif;fill:#1f2937}.bg{fill:#fbfaf7}.h{font-size:28px;font-weight:700;fill:#1e293b}.t{font-size:15px;font-weight:700;fill:#1e293b}.b{font-size:13px;fill:#475569}.box{fill:#fff;stroke:#d1d5db;stroke-width:2;rx:14}.blue{fill:#eff6ff;stroke:#93c5fd;stroke-width:2}.orange{fill:#fff7ed;stroke:#fdba74;stroke-width:2}.purple{fill:#f5f3ff;stroke:#c4b5fd;stroke-width:2}.green{fill:#f0fdf4;stroke:#86efac;stroke-width:2}.red{fill:#fff1f2;stroke:#fca5a5;stroke-width:2}.arrow{stroke:#718096;stroke-width:2;fill:none;marker-end:url(#a)}
  </style>
  <rect width="960" height="640" rx="24" fill="#fbfaf7"/>
  <text class="h" x="40" y="42">Venture System Map</text>
  <text class="b" x="40" y="66">A product is not a venture. A venture is a system. Seven components must all work together.</text>

  <rect class="blue" x="360" y="88" width="240" height="90" rx="18"/>
  <text class="t" x="380" y="118">Value Proposition</text>
  <text class="b" x="380" y="142">What promise must be delivered?</text>

  <rect class="orange" x="40" y="200" width="210" height="130" rx="18"/>
  <text class="t" x="60" y="228">Key Activities</text>
  <text class="b" x="60" y="252">Sales, delivery, product, data, support</text>
  <path class="arrow" d="M250 265 H360"/>

  <rect class="blue" x="710" y="200" width="210" height="130" rx="18"/>
  <text class="t" x="730" y="228">Key Resources</text>
  <text class="b" x="730" y="252">People, capital, data, brand, tech</text>
  <path class="arrow" d="M710 265 H600"/>

  <rect class="purple" x="40" y="400" width="210" height="130" rx="18"/>
  <text class="t" x="60" y="428">Key Partners</text>
  <text class="b" x="60" y="452">Who must be involved to make the model work?</text>
  <path class="arrow" d="M250 465 H360"/>

  <rect class="green" x="360" y="360" width="240" height="130" rx="18"/>
  <text class="t" x="380" y="388">Team &amp; Culture</text>
  <text class="b" x="380" y="412">Who can learn and execute?</text>
  <text class="b" x="380" y="432">What happens when bad news arrives?</text>

  <rect class="orange" x="710" y="400" width="210" height="130" rx="18"/>
  <text class="t" x="730" y="428">Finance</text>
  <text class="b" x="730" y="452">Cash, margin, runway, payback</text>
  <path class="arrow" d="M710 465 H600"/>

  <rect class="red" x="360" y="520" width="240" height="70" rx="18"/>
  <text class="t" x="380" y="548">Risk &amp; Kill Criteria</text>
  <text class="b" x="380" y="572">What can break? When do we stop?</text>

  <rect class="box" x="40" y="84" width="880" height="520" rx="20"/>
  <text class="h" x="60" y="620">System question: Can this venture repeatedly create, deliver, and capture value — without the system collapsing?</text>
</svg>
