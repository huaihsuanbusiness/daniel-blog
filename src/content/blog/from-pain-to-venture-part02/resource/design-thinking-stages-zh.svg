<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1428 798" role="img" aria-labelledby="title desc">
  <title id="title">Design Thinking – Five-Stage and Six-Stage Versions 設計思考常見階段版本</title>
  <desc id="desc">比較 Stanford D-School 五階段與 HPI D-School 六階段的設計思考模型，展示 Empathise、Define、Ideate、Prototype、Test 與六階段加上 Launch/Implement 的對照。</desc>
  <style>
text{font-family:'Noto Sans TC',Arial,sans-serif;fill:#1f2937}.title{font-size:26px;font-weight:700;fill:#1e293b}.label{font-size:14px;font-weight:700;fill:#1e293b}.stage{font-size:15px;font-weight:700;fill:#fff}.arrow{stroke:#94a3b8;stroke-width:2.5;fill:none;marker-end:url(#arr)}.bg{fill:#fbfaf7}
  </style>
  <rect width="1428" height="798" fill="#fbfaf7"/>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/></marker>
  </defs>
  <text x="40" y="42" class="title">Design Thinking 設計思考｜常見階段版本</text>

  <!-- Five-stage version -->
  <rect x="40" y="68" width="250" height="56" rx="14" fill="#3b82f6"/>
  <text x="165" y="103" class="stage" text-anchor="middle">Stanford D-School</text>
  <text x="165" y="122" class="stage" text-anchor="middle" font-size="13px" fill="#bfdbfe">五階段版本</text>

  <rect x="330" y="68" width="175" height="56" rx="16" fill="#1d4ed8"/>
  <text x="417" y="103" class="stage" text-anchor="middle">Empathise 同理</text>

  <path d="M505 96 H545" class="arrow"/>
  <rect x="545" y="68" width="175" height="56" rx="16" fill="#1d4ed8"/>
  <text x="632" y="103" class="stage" text-anchor="middle">Define 定義</text>

  <path d="M720 96 H760" class="arrow"/>
  <rect x="760" y="68" width="175" height="56" rx="16" fill="#1d4ed8"/>
  <text x="847" y="103" class="stage" text-anchor="middle">Ideate 發想</text>

  <path d="M935 96 H975" class="arrow"/>
  <rect x="975" y="68" width="175" height="56" rx="16" fill="#1d4ed8"/>
  <text x="1062" y="103" class="stage" text-anchor="middle">Prototype 原型</text>

  <path d="M1150 96 H1190" class="arrow"/>
  <rect x="1190" y="68" width="175" height="56" rx="16" fill="#1d4ed8"/>
  <text x="1277" y="103" class="stage" text-anchor="middle">Test 測試</text>

  <!-- Six-stage version -->
  <rect x="40" y="178" width="250" height="56" rx="14" fill="#7c3aed"/>
  <text x="165" y="213" class="stage" text-anchor="middle">HPI D-School</text>
  <text x="165" y="232" class="stage" text-anchor="middle" font-size="13px" fill="#ddd6fe">六階段版本</text>

  <rect x="330" y="178" width="155" height="56" rx="16" fill="#5b21b6"/>
  <text x="407" y="213" class="stage" text-anchor="middle">Empathise 同理</text>

  <path d="M485 206 H515" class="arrow"/>
  <rect x="515" y="178" width="155" height="56" rx="16" fill="#5b21b6"/>
  <text x="592" y="213" class="stage" text-anchor="middle">Define 定義</text>

  <path d="M670 206 H700" class="arrow"/>
  <rect x="700" y="178" width="155" height="56" rx="16" fill="#5b21b6"/>
  <text x="777" y="213" class="stage" text-anchor="middle">Ideate 發想</text>

  <path d="M855 206 H885" class="arrow"/>
  <rect x="885" y="178" width="155" height="56" rx="16" fill="#5b21b6"/>
  <text x="962" y="213" class="stage" text-anchor="middle">Prototype 原型</text>

  <path d="M1040 206 H1070" class="arrow"/>
  <rect x="1070" y="178" width="155" height="56" rx="16" fill="#5b21b6"/>
  <text x="1147" y="213" class="stage" text-anchor="middle">Test 測試</text>

  <path d="M1225 206 H1255" class="arrow"/>
  <rect x="1255" y="178" width="130" height="56" rx="16" fill="#5b21b6"/>
  <text x="1320" y="213" class="stage" text-anchor="middle">Launch 交付</text>

  <!-- Description -->
  <rect x="40" y="270" width="1340" height="100" rx="16" fill="#fff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="60" y="302" class="label">五階段（Stanford D-School）</text>
  <text x="60" y="326" font-size="14px" fill="#6b7280">Empathise → Define → Ideate → Prototype → Test</text>
  <text x="60" y="348" font-size="13px" fill="#9ca3af">最廣泛被引用的版本。常用於商業與 UX 領域。強調以人為本的迭代。</text>

  <rect x="40" y="390" width="1340" height="120" rx="16" fill="#fff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="60" y="422" class="label">六階段（HPI D-School，德國）</text>
  <text x="60" y="446" font-size="14px" fill="#6b7280">Empathise → Define → Ideate → Prototype → Test → Launch/Implement</text>
  <text x="60" y="470" font-size="13px" fill="#9ca3af">多了 Launch/Implement 階段。結構更完整，適合長期專案與企業環境。</text>
  <text x="60" y="492" font-size="13px" fill="#9ca3af">少了那種「突破式」的感覺，但驗證到交付的連貫性更好。</text>

  <!-- Context note -->
  <rect x="40" y="540" width="1340" height="90" rx="16" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="60" y="574" class="label" fill="#1e40af">重要說明</text>
  <text x="60" y="600" font-size="14px" fill="#1e40af">Design Thinking 不是固定公式。階段與名稱因機構而異。</text>
  <text x="60" y="622" font-size="13px" fill="#3b82f6">真正重要的，是背後那個紀律：觀察、定義真正問題、發散、</text>

  <!-- Source -->
  <text x="60" y="676" font-size="13px" fill="#9ca3af">來源：Strategyzer、Stanford D-School、HPI D-School</text>

</svg>