<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">CPS Validation and Four D Loop</title>
  <desc id="desc">A structured map of CPS content, presentation, validation and a practical Define, Discover, Develop, Deliver loop.</desc>
  <defs>
    <style>
      text{font-family:Arial,sans-serif;fill:#1e293b}.bg{fill:#fbfaf7}.box{fill:#fff;stroke:#d6d3d1;stroke-width:2}.cbox{fill:#eff6ff;stroke:#93c5fd;stroke-width:2}.pbox{fill:#fff7ed;stroke:#fdba74;stroke-width:2}.pbox2{fill:#f5f3ff;stroke:#c4b5fd;stroke-width:2}.h{font-size:22px;font-weight:700}.t{font-size:16px}.small{font-size:14px;fill:#64748b}.arrow{stroke:#475569;stroke-width:2.5;fill:none;marker-end:url(#arr)}
      .d1{fill:#fff7ed}.d2{fill:#fff}.d3{fill:#eff6ff}.d4{fill:#f0fdf4}
    </style>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/></marker>
  </defs>
  <rect class="bg" x="0" y="0" width="960" height="560" rx="24"/>
  <text class="h" x="40" y="40">CPS Validation and Four D Loop</text>
  <text class="small" x="40" y="64">Keep the tools, but ensure each serves judgement — not just form-filling.</text>

  <rect class="cbox" x="40" y="85" width="280" height="210" rx="18"/>
  <text class="t" x="60" y="115" font-weight="700">CPS Content</text>
  <text class="small" x="60" y="138">Actor &amp; situation</text>
  <text class="small" x="60" y="158">Expectation gap to be met</text>
  <text class="small" x="60" y="178">Leverage point</text>
  <text class="small" x="60" y="198">Solution</text>

  <rect class="pbox" x="340" y="85" width="280" height="210" rx="18"/>
  <text class="t" x="360" y="115" font-weight="700">CPS Presentation</text>
  <text class="small" x="360" y="138">Aspiration</text>
  <text class="small" x="360" y="158">Value proposition</text>
  <text class="small" x="360" y="178">One-sentence articulation</text>
  <text class="small" x="360" y="198">User Story</text>

  <rect class="pbox2" x="640" y="85" width="280" height="210" rx="18"/>
  <text class="t" x="660" y="115" font-weight="700">CPS Validation</text>
  <text class="small" x="660" y="138">Validation table</text>
  <text class="small" x="660" y="158">Logbook</text>
  <text class="small" x="660" y="178">Mutual challenge</text>

  <text class="h" x="40" y="335">Four D Process (practical order)</text>

  <rect class="d1" x="40" y="355" width="200" height="150" rx="16" stroke="#fdba74" stroke-width="1.5"/>
  <text class="t" x="60" y="385" font-weight="700">Define</text>
  <text class="small" x="60" y="410">Define &amp; ideate</text>
  <text class="small" x="60" y="430">Focus on key opportunity</text>
  <text class="small" x="60" y="450">Build validation plan</text>
  <path d="M140 505 L160 505 L154 498 L148 505 L160 505 L154 512 Z" fill="#475569"/>

  <rect class="d2" x="260" y="355" width="200" height="150" rx="16" stroke="#d6d3d1" stroke-width="1.5"/>
  <text class="t" x="280" y="385" font-weight="700">Discover</text>
  <text class="small" x="280" y="410">Action-based validation</text>
  <text class="small" x="280" y="430">Execute validation</text>
  <text class="small" x="280" y="450">Deepen understanding</text>

  <rect class="d3" x="480" y="355" width="200" height="150" rx="16" stroke="#93c5fd" stroke-width="1.5"/>
  <text class="t" x="500" y="385" font-weight="700">Develop</text>
  <text class="small" x="500" y="410">Redefine &amp; ideate</text>
  <text class="small" x="500" y="430">Generate more options</text>
  <text class="small" x="500" y="450">Focus on best solution</text>

  <rect class="d4" x="700" y="355" width="200" height="150" rx="16" stroke="#86efac" stroke-width="1.5"/>
  <text class="t" x="720" y="385" font-weight="700">Deliver</text>
  <text class="small" x="720" y="410">Deliver / test</text>
  <text class="small" x="720" y="430">Based on results</text>
  <text class="small" x="720" y="450">Further focus on key points</text>
</svg>
