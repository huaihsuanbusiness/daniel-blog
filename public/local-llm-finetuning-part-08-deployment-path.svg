<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
  <defs>
    <style>
      .t{font-family:Arial,Inter,sans-serif;fill:#1f2937}.h{font-size:28px;font-weight:700}.s{font-size:16px}.b{font-size:18px;font-weight:700}.n{font-size:14px}
      .box{stroke:#cbd5e1;stroke-width:2;rx:18;ry:18}.a{fill:#e0f2fe}.b1{fill:#ede9fe}.c{fill:#ffedd5}.d{fill:#dcfce7}
      .arrow{stroke:#64748b;stroke-width:2.5;fill:none;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#64748b"/></marker>
  </defs>
  <text x="60" y="60" class="t h">From training artefacts back to Ollama</text>
  <text x="60" y="92" class="t s">Adapters are not yet products. Packaging, merging and quantisation turn them into locally runnable models.</text>
  <rect x="70" y="250" width="240" height="180" class="box a"/>
  <text x="100" y="295" class="t b">Adapter artefacts</text>
  <text x="100" y="330" class="t n">adapter_model.safetensors</text>
  <text x="100" y="355" class="t n">adapter_config.json</text>

  <rect x="390" y="250" width="240" height="180" class="box b1"/>
  <text x="420" y="295" class="t b">Merged model</text>
  <text x="420" y="330" class="t n">model.safetensors</text>
  <text x="420" y="355" class="t n">full weights</text>

  <rect x="710" y="250" width="240" height="180" class="box c"/>
  <text x="740" y="295" class="t b">Quantized model</text>
  <text x="740" y="330" class="t n">q4 / q4_K_M / other runtime forms</text>

  <rect x="1030" y="250" width="280" height="180" class="box d"/>
  <text x="1060" y="295" class="t b">Ollama package</text>
  <text x="1060" y="330" class="t n">Modelfile</text>
  <text x="1060" y="355" class="t n">FROM / SYSTEM / TEMPLATE / PARAMETER</text>

  <path d="M310 340 H390" class="arrow"/>
  <path d="M630 340 H710" class="arrow"/>
  <path d="M950 340 H1030" class="arrow"/>
</svg>