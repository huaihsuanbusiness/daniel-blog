<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 860" role="img" aria-labelledby="title desc">
  <title id="title">Business Model Canvas Validation 商業模式九宮格驗證</title>
  <desc id="desc">將商業模式九宮格拆成九個獨立區塊，避免文字擠壓，並把 Channels 與 Cost Structure 明確拆開。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <style>
    text { font-family: 'Noto Sans TC', Arial, sans-serif; fill: #1f2937; }
    .title { font-size: 28px; font-weight: 700; fill: #1e293b; }
    .sub { font-size: 14px; fill: #64748b; }
    .box { fill: #ffffff; stroke: #d1d5db; stroke-width: 2; rx: 16; }
    .key { font-size: 16px; font-weight: 700; fill: #1e293b; }
    .val { font-size: 13px; fill: #475569; }
    .q { font-size: 12px; fill: #475569; }
    .arrowLine { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>

  <rect width="1040" height="860" rx="28" fill="#fbfaf7"/>

  <text class="title" x="40" y="48">Business Model Canvas Validation 商業模式九宮格驗證</text>
  <text class="sub" x="40" y="72">把九宮格當成九組假設；每一格都要先能被市場回答，再往下建設。</text>

  <rect class="box" x="40" y="92" width="960" height="72" fill="#f0fdf4" stroke="#86efac"/>
  <text class="q" x="60" y="122">核心問題：這個商業模式能否持續地創造、交付、並 capture 價值，</text>
  <text class="q" x="60" y="142">而不讓整個模型最後反過來把自己吃掉？</text>

  <rect class="box" x="40" y="188" width="250" height="128"/>
  <text class="key" x="58" y="214">Key Partners 關鍵夥伴</text>
  <text class="val" x="58" y="238">誰必須幫忙？為什麼是他們？</text>
  <text class="q" x="58" y="264">他們真的會合作嗎？</text>
  <text class="q" x="58" y="284">什麼能降低他們的合作成本？</text>

  <rect class="box" x="315" y="188" width="250" height="128"/>
  <text class="key" x="333" y="214">Key Activities 關鍵活動</text>
  <text class="val" x="333" y="238">銷售、交付、產品、數據</text>
  <text class="q" x="333" y="264">哪些活動不能外包？</text>
  <text class="q" x="333" y="284">哪些活動需要深度專業？</text>

  <rect class="box" x="590" y="188" width="410" height="128" fill="#f5f3ff" stroke="#c4b5fd"/>
  <text class="key" x="608" y="214">Value Propositions 價值主張</text>
  <text class="val" x="608" y="238">顧客為什麼要在意？</text>
  <text class="val" x="608" y="256">你的核心承諾到底是什麼？</text>
  <text class="q" x="608" y="282">這個承諾是否夠具體，</text>
  <text class="q" x="608" y="300">以至於成功或失敗都能被量測？</text>

  <rect class="box" x="40" y="342" width="250" height="142"/>
  <text class="key" x="58" y="368">Customer Relationships 顧客關係</text>
  <text class="val" x="58" y="392">如何獲取、留住、擴大顧客？</text>
  <text class="q" x="58" y="418">所謂留住顧客，實際長什麼樣子？</text>
  <text class="q" x="58" y="438">你打算怎麼衡量？</text>

  <rect class="box" x="315" y="342" width="250" height="142"/>
  <text class="key" x="333" y="368">Revenue Streams 營收模式</text>
  <text class="val" x="333" y="392">訂閱 / 使用量 / 一次性 / 成果收費 / 混合</text>
  <text class="q" x="333" y="418">主要營收流是哪一個？</text>
  <text class="q" x="333" y="438">它能覆蓋完整成本結構嗎？</text>

  <rect class="box" x="590" y="342" width="410" height="128" fill="#eef6ff" stroke="#93c5fd"/>
  <text class="key" x="608" y="368">Channels 通路</text>
  <text class="val" x="608" y="392">如何接觸、導入、交付？</text>
  <text class="q" x="608" y="418">在沒有品牌、口碑、或高額銷售預算時，</text>
  <text class="q" x="608" y="438">還能接觸到早期顧客嗎？</text>

  <rect class="box" x="40" y="510" width="250" height="142" fill="#eff6ff" stroke="#93c5fd"/>
  <text class="key" x="58" y="536">Customer Segments 顧客區隔</text>
  <text class="val" x="58" y="560">誰付錢？誰受益但沒有付費？</text>
  <text class="q" x="58" y="586">ICP 是否真的已經透過</text>
  <text class="q" x="58" y="606">問題發現被驗證？</text>

  <rect class="box" x="315" y="510" width="250" height="142" fill="#fff7ed" stroke="#fdba74"/>
  <text class="key" x="333" y="536">Key Resources 關鍵資源</text>
  <text class="val" x="333" y="560">人、資金、數據、品牌、技術</text>
  <text class="q" x="333" y="586">你實際控制的是什麼？</text>
  <text class="q" x="333" y="606">最有防守性的是哪一項？</text>

  <rect class="box" x="590" y="496" width="410" height="156" fill="#fff8ef" stroke="#fdba74"/>
  <text class="key" x="608" y="524">Cost Structure 成本結構</text>
  <text class="val" x="608" y="548">固定 vs 變動｜規模曲線｜利潤輪廓</text>
  <text class="q" x="608" y="574">一旦規模擴大，成本會在哪裡爆開？</text>
  <text class="q" x="608" y="594">主要營收流的邊際利潤到底是多少？</text>

  <line class="arrowLine" x1="290" y1="252" x2="315" y2="252"/>
  <line class="arrowLine" x1="565" y1="252" x2="590" y2="252"/>
  <line class="arrowLine" x1="290" y1="413" x2="315" y2="413"/>
  <line class="arrowLine" x1="565" y1="413" x2="590" y2="413"/>
  <line class="arrowLine" x1="290" y1="581" x2="315" y2="581"/>
  <line class="arrowLine" x1="565" y1="581" x2="590" y2="581"/>

  <rect class="box" x="40" y="684" width="960" height="92" fill="#fff1f2" stroke="#fca5a5"/>
  <text class="key" x="60" y="716">驗證順序</text>
  <text class="q" x="60" y="742">顧客 → 價值 → 通路 → 營收 → 成本 → 夥伴</text>
  <text class="q" x="60" y="762">→ 決策規則</text>
</svg>
