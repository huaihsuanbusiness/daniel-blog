<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760">
  <defs>
    <style>
      text { font-family: Arial, Inter, sans-serif; fill: #222; }
      .title { font-size: 28px; font-weight: 700; }
      .subtitle { font-size: 15px; fill: #555; }
      .box-title { font-size: 22px; font-weight: 700; }
      .item { font-size: 18px; }
      .arrow { stroke: #888; stroke-width: 3; fill: none; marker-end: url(#m); }
    </style>
    <marker id="m" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="760" fill="#fafafa"/>
  <text x="60" y="70" class="title">Refinement before and after AI-assisted drafting</text>
  <text x="60" y="100" class="subtitle">The shift is not from refinement to no refinement, but from manual production to boundary work.</text>

  <rect x="60" y="150" rx="22" ry="22" width="480" height="520" fill="#fff3e5" stroke="#efc88d"/>
  <text x="90" y="205" class="box-title">Before AI</text>
  <rect x="100" y="245" rx="18" ry="18" width="390" height="80" fill="#fff" stroke="#ddd"/>
  <text x="125" y="292" class="item">Manual story writing</text>
  <path d="M 295 325 L 295 360" class="arrow"/>
  <rect x="100" y="360" rx="18" ry="18" width="390" height="80" fill="#fff" stroke="#ddd"/>
  <text x="125" y="407" class="item">Manual AC drafting</text>
  <path d="M 295 440 L 295 475" class="arrow"/>
  <rect x="100" y="475" rx="18" ry="18" width="390" height="80" fill="#fff" stroke="#ddd"/>
  <text x="125" y="522" class="item">Long sync-heavy meeting</text>
  <text x="100" y="605" class="subtitle">Much of the energy goes into producing</text>
  <text x="100" y="630" class="subtitle">the content before the team can even argue</text>
  <text x="100" y="655" class="subtitle">about the boundaries.</text>

  <rect x="660" y="150" rx="22" ry="22" width="480" height="520" fill="#eef7ff" stroke="#b8d8f2"/>
  <text x="690" y="205" class="box-title">After AI</text>
  <rect x="700" y="245" rx="18" ry="18" width="390" height="70" fill="#fff" stroke="#ddd"/>
  <text x="725" y="287" class="item">AI first draft</text>
  <path d="M 895 315 L 895 345" class="arrow"/>
  <rect x="700" y="345" rx="18" ry="18" width="390" height="70" fill="#fff" stroke="#ddd"/>
  <text x="725" y="387" class="item">Boundary review</text>
  <path d="M 895 415 L 895 445" class="arrow"/>
  <rect x="700" y="445" rx="18" ry="18" width="390" height="70" fill="#fff" stroke="#ddd"/>
  <text x="725" y="487" class="item">Dependency and risk check</text>
  <path d="M 895 515 L 895 545" class="arrow"/>
  <rect x="700" y="545" rx="18" ry="18" width="390" height="70" fill="#fff" stroke="#ddd"/>
  <text x="725" y="587" class="item">DoD alignment</text>
  <text x="700" y="655" class="subtitle">The meeting is no longer there to produce</text>
  <text x="700" y="680" class="subtitle">content from scratch. It is there to sharpen</text>
  <text x="700" y="705" class="subtitle">what the team is really committing to.</text>
</svg>
