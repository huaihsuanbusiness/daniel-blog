<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
text{font-family:Arial,Inter,sans-serif; fill:#0f172a}
.title{font-size:30px;font-weight:700}
.sub{font-size:15px;fill:#475569}
.box{rx:20;ry:20;stroke:#cbd5e1;stroke-width:1.5}
.h{font-size:20px;font-weight:700}
.b{font-size:14px}
.small{font-size:13px;fill:#475569}
</style>
<marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#64748b"/></marker>
</defs>
<rect width="1200" height="760" fill="#f8fafc"/>
<text x="50" y="60" class="title">A practical five-layer model for AI skills</text>
<text x="50" y="88" class="sub">Separate user-facing reasoning, task methodology, tool contracts, and infrastructure before the system turns muddy.</text>

<rect x="70" y="130" width="1060" height="90" class="box" fill="#eef2ff"/>
<text x="100" y="165" class="h">1. Host / Client</text>
<text x="100" y="190" class="b">ChatGPT, Claude, your app, or any interface where the user actually starts the conversation.</text>

<rect x="70" y="250" width="1060" height="100" class="box" fill="#f5f3ff"/>
<text x="100" y="285" class="h">2. Runtime / Orchestrator</text>
<text x="100" y="310" class="b">Maintains state, coordinates tool loops, handles retries, tracing, fallbacks, and handoffs.</text>
<text x="100" y="332" class="small">This is not the same thing as “the model”.</text>

<rect x="70" y="380" width="1060" height="110" class="box" fill="#fdf2f8"/>
<text x="100" y="415" class="h">3. Skill Layer</text>
<text x="100" y="440" class="b">Task methodology: when to use a capability, in what order, with which guardrails, and what the output should look like.</text>
<text x="100" y="462" class="small">Examples: job_ingestion, job_querying, job_decision_support.</text>

<rect x="70" y="520" width="1060" height="100" class="box" fill="#fff7ed"/>
<text x="100" y="555" class="h">4. Tool Layer</text>
<text x="100" y="580" class="b">Concrete capabilities with stable input and output contracts: fetch, score, query, resolve, generate.</text>
<text x="100" y="602" class="small">Tools do not need to understand the whole task.</text>

<rect x="70" y="650" width="1060" height="70" class="box" fill="#eff6ff"/>
<text x="100" y="690" class="h">5. Infrastructure / Transport</text>
<text x="430" y="690" class="b">HTTPS, /mcp endpoint, auth, VM, container, queues, logs, secret storage.</text>

<line x1="600" y1="220" x2="600" y2="248" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/>
<line x1="600" y1="350" x2="600" y2="378" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/>
<line x1="600" y1="490" x2="600" y2="518" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/>
<line x1="600" y1="620" x2="600" y2="648" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/>

<rect x="790" y="30" width="330" height="72" class="box" fill="#ffffff"/>
<text x="812" y="58" class="h" style="font-size:18px">Do not collapse these into one blob</text>
<text x="812" y="81" class="small">That is how “agent systems” quietly become hard to reason about.</text>
</svg>