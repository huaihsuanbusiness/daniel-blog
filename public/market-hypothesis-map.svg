<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640">
<style>
text{font-family:Arial, sans-serif; fill:#223}.title{font-size:30px;font-weight:700}.h{font-size:18px;font-weight:700}.b{font-size:14px}.box{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:16}.soft{fill:#f8fafc}.arrow{stroke:#64748b;stroke-width:3;fill:none;marker-end:url(#a)}
</style>
<defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker></defs>
<text x="50" y="55" class="title">Market Hypothesis Map</text>
<rect x="70" y="100" width="250" height="135" class="box soft"/><text x="95" y="138" class="h">Customer Segments</text><text x="95" y="168" class="b">Who has the urgent job?</text><text x="95" y="195" class="b">What buying factors matter?</text>
<rect x="360" y="100" width="250" height="135" class="box"/><text x="385" y="138" class="h">Market Scale</text><text x="385" y="168" class="b">TAM / SAM / SOM</text><text x="385" y="195" class="b">Growth and timing</text>
<rect x="650" y="100" width="250" height="135" class="box soft"/><text x="675" y="138" class="h">Competition</text><text x="675" y="168" class="b">Direct, indirect, substitutes</text><text x="675" y="195" class="b">Status quo and workarounds</text>
<rect x="940" y="100" width="200" height="135" class="box"/><text x="965" y="138" class="h">Positioning</text><text x="965" y="168" class="b">Category, difference</text><text x="965" y="195" class="b">Why now?</text>
<path d="M320 168 H360" class="arrow"/><path d="M610 168 H650" class="arrow"/><path d="M900 168 H940" class="arrow"/>
<rect x="110" y="330" width="980" height="175" class="box"/>
<text x="145" y="370" class="h">Core question</text>
<text x="145" y="405" class="b">Are we entering a reachable, growing, budgeted market where the customer has a reason to switch now?</text>
<text x="145" y="445" class="b">A market is not “many people might use this”. It is a structure of customers, alternatives, budgets, timing and adoption friction.</text>
</svg>