<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="600" viewBox="0 0 1160 600">
  <defs>
    <style>
      .title { font: 700 28px Inter, Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 14px Inter, Arial, sans-serif; fill: #475569; }
      .line { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #94a3b8; stroke-width: 2; fill: none; stroke-dasharray: 6 6; marker-end: url(#arrow); }
      .note { font: 12px Inter, Arial, sans-serif; fill: #64748b; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1160" height="600" fill="#f8fafc"/>
  <text x="48" y="52" class="title">Where MCP actually helps</text>
  <text x="48" y="78" class="subtitle">MCP is best at cleaning up capability boundaries, not magically fixing messy systems.</text>
  <rect x="70" y="150" width="250" height="130" rx="18" ry="18" fill="#ffedd5" stroke="#fdba74" stroke-width="1.5"/>
<text x="90" y="180" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Before MCP</text>
<text x="90" y="205" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">workflow owns chat logic</text>
<text x="90" y="225" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">workflow owns routing</text>
<text x="90" y="245" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">workflow owns tool calls</text>
<text x="90" y="265" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">workflow owns replies</text>
<rect x="390" y="130" width="280" height="170" rx="18" ry="18" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.5"/>
<text x="410" y="160" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">MCP helps here</text>
<text x="410" y="185" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">high-level tool names</text>
<text x="410" y="205" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">clean descriptions</text>
<text x="410" y="225" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">stable schemas</text>
<text x="410" y="245" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">clear helper vs public tools</text>
<text x="410" y="265" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">skills as visible surface</text>
<rect x="760" y="150" width="320" height="130" rx="18" ry="18" fill="#fff1f2" stroke="#fda4af" stroke-width="1.5"/>
<text x="780" y="180" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Still not solved automatically</text>
<text x="780" y="205" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">runtime selection quality</text>
<text x="780" y="225" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">bad descriptions</text>
<text x="780" y="245" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">messy backend contracts</text>
<text x="780" y="265" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">poor security hygiene</text>
<rect x="160" y="380" width="320" height="150" rx="18" ry="18" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
<text x="180" y="410" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Useful if you need</text>
<text x="180" y="435" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">public HTTPS endpoint</text>
<text x="180" y="455" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">capability governance</text>
<text x="180" y="475" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">hidden raw tools</text>
<text x="180" y="495" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">repo-versioned skill files</text>
<rect x="620" y="380" width="320" height="150" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
<text x="640" y="410" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Overkill if you only need</text>
<text x="640" y="435" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">single local client</text>
<text x="640" y="455" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">quick prototype</text>
<text x="640" y="475" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">no secrets or policy layer</text>
<text x="640" y="495" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">one or two simple tools</text>
<path class="line" d="M320 215 H390"/>
<path class="line" d="M670 215 H760"/>
<path class="dash" d="M530 300 V380"/>
</svg>