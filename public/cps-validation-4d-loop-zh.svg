<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">CPS 驗證與 Four D 流程</title>
  <desc id="desc">CPS 的內涵、呈現、驗證方式，以及偏實務的 Four D 驗證順序圖。</desc>
  <defs>
    <style>
      text{font-family:'Noto Sans TC',Arial,sans-serif;fill:#1e293b}.bg{fill:#fbfaf7}.box{fill:#fff;stroke:#d6d3d1;stroke-width:2}.cbox{fill:#eff6ff;stroke:#93c5fd;stroke-width:2}.pbox{fill:#fff7ed;stroke:#fdba74;stroke-width:2}.pbox2{fill:#f5f3ff;stroke:#c4b5fd;stroke-width:2}.h{font-size:22px;font-weight:700}.t{font-size:16px}.small{font-size:14px;fill:#64748b}.arrow{stroke:#475569;stroke-width:2.5;fill:none;marker-end:url(#arr)}
      .d1{fill:#fff7ed}.d2{fill:#fff}.d3{fill:#eff6ff}.d4{fill:#f0fdf4}
    </style>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/></marker>
  </defs>
  <rect class="bg" x="0" y="0" width="960" height="560" rx="24"/>
  <text class="h" x="40" y="40">CPS 驗證與 Four D 流程</text>
  <text class="small" x="40" y="64">把工具保留下來，但每個工具都要服務判斷，不只是填表。</text>

  <rect class="cbox" x="40" y="85" width="280" height="210" rx="18"/>
  <text class="t" x="60" y="115" font-weight="700">CPS 的內涵</text>
  <text class="small" x="60" y="138">當事人的情境</text>
  <text class="small" x="60" y="158">所要完成事情的期許落差</text>
  <text class="small" x="60" y="178">施力點</text>
  <text class="small" x="60" y="198">解決方案</text>

  <rect class="pbox" x="340" y="85" width="280" height="210" rx="18"/>
  <text class="t" x="360" y="115" font-weight="700">CPS 的呈現</text>
  <text class="small" x="360" y="138">期許</text>
  <text class="small" x="360" y="158">價值主張</text>
  <text class="small" x="360" y="178">一句話表述</text>
  <text class="small" x="360" y="198">User Story</text>

  <rect class="pbox2" x="640" y="85" width="280" height="210" rx="18"/>
  <text class="t" x="660" y="115" font-weight="700">CPS 的驗證</text>
  <text class="small" x="660" y="138">驗證表格</text>
  <text class="small" x="660" y="158">Logbook</text>
  <text class="small" x="660" y="178">相互挑戰</text>

  <text class="h" x="40" y="335">Four D Process（偏實務的驗證順序）</text>

  <rect class="d1" x="40" y="355" width="200" height="150" rx="16" stroke="#fdba74" stroke-width="1.5"/>
  <text class="t" x="60" y="385" font-weight="700">Define 定義</text>
  <text class="small" x="60" y="410">定義與發想</text>
  <text class="small" x="60" y="430">聚焦重大機會</text>
  <text class="small" x="60" y="450">建立驗證計畫</text>
  <path d="M140 505 L160 505 L154 498 L148 505 L160 505 L154 512 Z" fill="#475569"/>

  <rect class="d2" x="260" y="355" width="200" height="150" rx="16" stroke="#d6d3d1" stroke-width="1.5"/>
  <text class="t" x="280" y="385" font-weight="700">Discover 行動驗證</text>
  <text class="small" x="280" y="410">執行驗證計畫</text>
  <text class="small" x="280" y="430">深化狀況了解</text>

  <rect class="d3" x="480" y="355" width="200" height="150" rx="16" stroke="#93c5fd" stroke-width="1.5"/>
  <text class="t" x="500" y="385" font-weight="700">Develop 再發想</text>
  <text class="small" x="500" y="410">再定義再發想</text>
  <text class="small" x="500" y="430">創造更多可能方案</text>
  <text class="small" x="500" y="450">聚焦最好解法</text>

  <rect class="d4" x="700" y="355" width="200" height="150" rx="16" stroke="#86efac" stroke-width="1.5"/>
  <text class="t" x="720" y="385" font-weight="700">Deliver 交付</text>
  <text class="small" x="720" y="410">交付 / 測試</text>
  <text class="small" x="720" y="430">根據成果</text>
  <text class="small" x="720" y="450">進一步聚焦關鍵點</text>
</svg>
