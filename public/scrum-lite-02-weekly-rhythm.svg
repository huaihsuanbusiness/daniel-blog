<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 420">
  <defs>
    <style>
      .t{font-family:Arial,Inter,sans-serif;fill:#1f2937}
      .h{font-size:32px;font-weight:700}
      .s{font-size:19px;font-weight:700}
      .b{font-size:16px}
      .box{rx:22;ry:22;stroke:#cbd5e1;stroke-width:2}
      .arrow{stroke:#94a3b8;stroke-width:3;fill:none;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="1400" height="420" fill="#f8fafc"/>
  <text x="50" y="60" class="t h">Weekly rhythm for a Scrum-lite team</text>

  <rect x="50" y="140" width="150" height="110" class="box" fill="#e0f2fe"/>
  <text x="125" y="185" text-anchor="middle" class="t s">Goal</text>
  <text x="125" y="212" text-anchor="middle" class="t b">Set focus</text>

  <rect x="240" y="140" width="180" height="110" class="box" fill="#ede9fe"/>
  <text x="330" y="180" text-anchor="middle" class="t s">Async refinement</text>
  <text x="330" y="208" text-anchor="middle" class="t b">AI first drafts</text>
  <text x="330" y="232" text-anchor="middle" class="t b">Boundary review</text>

  <rect x="460" y="140" width="170" height="110" class="box" fill="#fef3c7"/>
  <text x="545" y="185" text-anchor="middle" class="t s">Short planning</text>
  <text x="545" y="212" text-anchor="middle" class="t b">Commit &amp; trade-off</text>

  <rect x="670" y="140" width="150" height="110" class="box" fill="#dcfce7"/>
  <text x="745" y="185" text-anchor="middle" class="t s">Build</text>
  <text x="745" y="212" text-anchor="middle" class="t b">Small batches</text>

  <rect x="860" y="140" width="180" height="110" class="box" fill="#fee2e2"/>
  <text x="950" y="180" text-anchor="middle" class="t s">Blocker checkpoint</text>
  <text x="950" y="208" text-anchor="middle" class="t b">Short sync or async</text>
  <text x="950" y="232" text-anchor="middle" class="t b">Escalate blockers</text>

  <rect x="1080" y="140" width="150" height="110" class="box" fill="#e0f2fe"/>
  <text x="1155" y="185" text-anchor="middle" class="t s">Review</text>
  <text x="1155" y="212" text-anchor="middle" class="t b">Check evidence</text>

  <rect x="1250" y="140" width="100" height="110" class="box" fill="#ede9fe"/>
  <text x="1300" y="183" text-anchor="middle" class="t s">Retro</text>
  <text x="1300" y="210" text-anchor="middle" class="t b">One rule</text>

  <path d="M200 195 L240 195" class="arrow"/>
  <path d="M420 195 L460 195" class="arrow"/>
  <path d="M630 195 L670 195" class="arrow"/>
  <path d="M820 195 L860 195" class="arrow"/>
  <path d="M1040 195 L1080 195" class="arrow"/>
  <path d="M1230 195 L1250 195" class="arrow"/>
  <path d="M1300 250 C1300 330, 125 330, 125 250" class="arrow"/>

  <text x="50" y="360" class="t b">The point is not fewer steps. The point is tighter loops and cleaner responsibility.</text>
</svg>