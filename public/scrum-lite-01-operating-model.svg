<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <defs>
    <style>
      .t{font-family:Arial,Inter,sans-serif;fill:#1f2937}
      .h{font-size:34px;font-weight:700}
      .s{font-size:20px;font-weight:700}
      .b{font-size:18px}
      .box{rx:24;ry:24;stroke:#cbd5e1;stroke-width:2}
      .title{font-size:16px;font-weight:700;fill:#475569}
    </style>
  </defs>
  <rect x="0" y="0" width="1200" height="720" fill="#f8fafc"/>
  <text x="60" y="70" class="t h">Scrum-lite operating model</text>
  <rect x="420" y="150" width="360" height="150" class="box" fill="#ffffff"/>
  <text x="600" y="195" text-anchor="middle" class="t s">Core rhythm</text>
  <text x="600" y="230" text-anchor="middle" class="t b">Keep speed, judgement, validation</text>
  <text x="600" y="258" text-anchor="middle" class="t b">and correction in the same loop</text>

  <rect x="60" y="150" width="280" height="250" class="box" fill="#e0f2fe"/>
  <text x="90" y="195" class="t s">Keep</text>
  <text x="90" y="235" class="t b">• Clear goal</text>
  <text x="90" y="270" class="t b">• Ownership</text>
  <text x="90" y="305" class="t b">• Review loop</text>
  <text x="90" y="340" class="t b">• Retro loop</text>
  <text x="90" y="375" class="t b">• Validation bar</text>

  <rect x="860" y="150" width="280" height="250" class="box" fill="#fee2e2"/>
  <text x="890" y="195" class="t s">Remove</text>
  <text x="890" y="235" class="t b">• Estimation theatre</text>
  <text x="890" y="270" class="t b">• Status-recital standups</text>
  <text x="890" y="305" class="t b">• Pretty-backlog theatre</text>
  <text x="890" y="340" class="t b">• Process as output</text>

  <rect x="220" y="470" width="760" height="180" class="box" fill="#ede9fe"/>
  <text x="250" y="515" class="t s">Add</text>
  <text x="250" y="555" class="t b">• AI-assisted first drafts</text>
  <text x="250" y="590" class="t b">• Context hygiene</text>
  <text x="610" y="555" class="t b">• Small-batch delivery</text>
  <text x="610" y="590" class="t b">• Explicit validation rules</text>

  <line x1="340" y1="275" x2="420" y2="225" stroke="#94a3b8" stroke-width="3"/>
  <line x1="860" y1="225" x2="780" y2="225" stroke="#94a3b8" stroke-width="3"/>
  <line x1="600" y1="300" x2="600" y2="470" stroke="#94a3b8" stroke-width="3"/>

  <text x="60" y="685" class="t title">Blog diagram: high-level operating model, not a full workflow map</text>
</svg>