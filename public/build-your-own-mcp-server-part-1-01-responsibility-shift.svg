<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <defs>
    <style>
      .title { font: 700 28px Inter, Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 14px Inter, Arial, sans-serif; fill: #475569; }
      .line { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #94a3b8; stroke-width: 2; fill: none; stroke-dasharray: 6 6; marker-end: url(#arrow); }
      .note { font: 12px Inter, Arial, sans-serif; fill: #64748b; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1200" height="620" fill="#f8fafc"/>
  <text x="48" y="52" class="title">Responsibility shift</text>
  <text x="48" y="78" class="subtitle">MCP matters most when it helps you stop using workflows as the system’s brain.</text>
  <rect x="60" y="130" width="250" height="150" rx="18" ry="18" fill="#ffedd5" stroke="#fdba74" stroke-width="1.5"/>
<text x="80" y="160" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Workflow-first system</text>
<text x="80" y="185" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">chat intake</text>
<text x="80" y="205" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">intent guess</text>
<text x="80" y="225" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">routing</text>
<text x="80" y="245" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">tool execution</text>
<text x="80" y="265" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">reply formatting</text>
<rect x="470" y="130" width="250" height="150" rx="18" ry="18" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.5"/>
<text x="490" y="160" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">MCP-oriented system</text>
<text x="490" y="185" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">host reasons</text>
<text x="490" y="205" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">server exposes contracts</text>
<text x="490" y="225" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">backend executes</text>
<text x="490" y="245" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">clearer capability boundary</text>
<rect x="880" y="130" width="250" height="150" rx="18" ry="18" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
<text x="900" y="160" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Backend execution layer</text>
<text x="900" y="185" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">Make flows</text>
<text x="900" y="205" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">APIs / Sheets / DB</text>
<text x="900" y="225" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">scraping / scoring</text>
<text x="900" y="245" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">output generation</text>
<rect x="290" y="380" width="320" height="170" rx="18" ry="18" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
<text x="310" y="410" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">What moves upward</text>
<text x="310" y="435" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">tool choice</text>
<text x="310" y="455" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">clarify or execute</text>
<text x="310" y="475" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">multi-tool synthesis</text>
<text x="310" y="495" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">user-facing response logic</text>
<rect x="700" y="380" width="340" height="170" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
<text x="720" y="410" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">What stays below</text>
<text x="720" y="435" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">stable execution contracts</text>
<text x="720" y="455" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">integration-heavy steps</text>
<text x="720" y="475" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">retrieval, writes, side effects</text>
<text x="720" y="495" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">low-level business logic</text>
<path class="line" d="M310 205 H470"/>
<path class="line" d="M720 205 H880"/>
<path class="line" d="M610 280 V380"/>
<path class="dash" d="M470 455 H610"/>
<text x="354" y="116" class="note">less hidden reasoning</text>
<rect x="510" y="92" width="176" height="28" rx="12" ry="12" fill="#ffffff" stroke="#cbd5e1"/><text x="522" y="110" font-family="Inter, Arial, sans-serif" font-size="12" fill="#475569">capability surface</text>
<rect x="900" y="92" width="150" height="28" rx="12" ry="12" fill="#ffffff" stroke="#cbd5e1"/><text x="912" y="110" font-family="Inter, Arial, sans-serif" font-size="12" fill="#475569">execution contracts</text>
</svg>