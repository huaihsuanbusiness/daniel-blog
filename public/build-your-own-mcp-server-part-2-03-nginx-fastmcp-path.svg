<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="610" viewBox="0 0 1180 610">
  <defs>
    <style>
      .title { font: 700 28px Inter, Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 14px Inter, Arial, sans-serif; fill: #475569; }
      .line { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #94a3b8; stroke-width: 2; fill: none; stroke-dasharray: 6 6; marker-end: url(#arrow); }
      .note { font: 12px Inter, Arial, sans-serif; fill: #64748b; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1180" height="610" fill="#f8fafc"/>
  <text x="48" y="52" class="title">Request path to /mcp</text>
  <text x="48" y="78" class="subtitle">Cloudflare, nginx, uvicorn, and FastMCP each own a different failure mode.</text>
  <rect x="70" y="170" width="210" height="130" rx="18" ry="18" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
<text x="90" y="200" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Cloudflare edge</text>
<text x="90" y="225" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">proxied DNS</text>
<text x="90" y="245" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">public HTTPS</text>
<text x="90" y="265" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">TLS to visitors</text>
<rect x="360" y="170" width="210" height="130" rx="18" ry="18" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.5"/>
<text x="380" y="200" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">nginx on VM</text>
<text x="380" y="225" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">443 listener</text>
<text x="380" y="245" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">origin certificate</text>
<text x="380" y="265" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">reverse proxy</text>
<rect x="650" y="170" width="220" height="130" rx="18" ry="18" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
<text x="670" y="200" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">uvicorn / ASGI</text>
<text x="670" y="225" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">127.0.0.1:8000</text>
<text x="670" y="245" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">private app process</text>
<text x="670" y="265" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">systemd managed</text>
<rect x="950" y="170" width="180" height="130" rx="18" ry="18" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
<text x="970" y="200" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">FastMCP /mcp</text>
<text x="970" y="225" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">streamable HTTP</text>
<text x="970" y="245" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">tools</text>
<text x="970" y="265" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">responses</text>
<rect x="300" y="400" width="620" height="140" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
<text x="320" y="430" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Common false signals</text>
<text x="320" y="455" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">`curl /mcp` returning a non-HTML status can still mean the request reached the MCP endpoint.</text>
<text x="320" y="475" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">A healthy nginx process does not guarantee valid TLS or correct proxy path.</text>
<path class="line" d="M280 235 H360"/>
<path class="line" d="M570 235 H650"/>
<path class="line" d="M870 235 H950"/>
</svg>