<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
<defs><style>.bg{fill:#f8fafc}.title{font:700 28px Arial,Inter,sans-serif;fill:#0f172a}.subtitle{font:400 14px Arial,Inter,sans-serif;fill:#475569}.boxt{font:700 16px Arial,Inter,sans-serif;fill:#0f172a}.txt{font:400 13px Arial,Inter,sans-serif;fill:#334155}.note{font:400 12px Arial,Inter,sans-serif;fill:#64748b}.edge{stroke-width:1.6;rx:18;ry:18}.line{stroke:#64748b;stroke-width:2.4;fill:none;marker-end:url(#arrow)}.g{fill:#dcfce7;stroke:#86efac}.b{fill:#dbeafe;stroke:#93c5fd}.o{fill:#ffedd5;stroke:#fdba74}.p{fill:#ede9fe;stroke:#c4b5fd}.n{fill:#fff;stroke:#cbd5e1}.r{fill:#ffe4e6;stroke:#fda4af}</style><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#64748b"/></marker></defs>
<rect class="bg" x="0" y="0" width="1280" height="720"/>
<text class="title" x="50" y="56">Why v3 moved from Make MCP server to a self-hosted gateway</text>
<text class="subtitle" x="50" y="82">The migration changed the public contract layer, not the execution runtime.</text>
<rect class="b edge" x="80" y="170" width="300" height="170"/>
<text class="boxt" x="98" y="200">v2</text>
<text class="txt" x="98" y="226">ChatGPT sees Make MCP tools</text>
<text class="txt" x="98" y="246">public surface close to scenarios</text>
<text class="txt" x="98" y="266">strategy still tied to Make</text>
<rect class="o edge" x="490" y="170" width="300" height="170"/>
<text class="boxt" x="508" y="200">Migration trigger</text>
<text class="txt" x="508" y="226">need skill-first entry points</text>
<text class="txt" x="508" y="246">need hidden helpers</text>
<text class="txt" x="508" y="266">need GitHub-versioned policy</text>
<rect class="p edge" x="900" y="170" width="290" height="170"/>
<text class="boxt" x="918" y="200">v3</text>
<text class="txt" x="918" y="226">ChatGPT sees gateway skills</text>
<text class="txt" x="918" y="246">Make stays execution layer</text>
<text class="txt" x="918" y="266">public contract is self-controlled</text>
<rect class="n edge" x="250" y="420" width="760" height="120"/>
<text class="boxt" x="268" y="450">Core change</text>
<text class="txt" x="268" y="476">The important change is not “remove Make”. It is “move the model-facing capability surface into a governed gateway”.</text>
<path class="line" d="M380 255 H490"/>
<path class="line" d="M790 255 H900"/>
<path class="line" d="M640 340 V420"/>
</svg>