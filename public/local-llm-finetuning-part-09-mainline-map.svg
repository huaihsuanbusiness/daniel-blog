<svg xmlns="http://www.w3.org/2000/svg" width="1420" height="820" viewBox="0 0 1420 820">
  <defs>
    <style>
      .t{font-family:Arial,Inter,sans-serif;fill:#1f2937}.h{font-size:28px;font-weight:700}.s{font-size:16px}.b{font-size:18px;font-weight:700}.n{font-size:14px}
      .box{stroke:#cbd5e1;stroke-width:2;rx:18;ry:18}.a{fill:#e0f2fe}.b1{fill:#ede9fe}.c{fill:#ffedd5}.d{fill:#dcfce7}.e{fill:#fee2e2}
      .arrow{stroke:#64748b;stroke-width:2.5;fill:none;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#64748b"/></marker>
  </defs>
  <text x="60" y="60" class="t h">Choosing a mainline version</text>
  <text x="60" y="92" class="t s">Reference models and experimental variants matter less than the final judgement filter.</text>

  <rect x="80" y="180" width="220" height="120" class="box a"/>
  <text x="110" y="225" class="t b">Lexi</text>
  <text x="110" y="255" class="t n">Reference point</text>

  <rect x="390" y="120" width="250" height="100" class="box b1"/>
  <text x="420" y="160" class="t b">baseline-small</text>

  <rect x="390" y="250" width="250" height="100" class="box b1"/>
  <text x="420" y="290" class="t b">qkvo-small</text>

  <rect x="390" y="380" width="250" height="100" class="box b1"/>
  <text x="420" y="420" class="t b">all-linear-small</text>

  <rect x="390" y="510" width="250" height="100" class="box b1"/>
  <text x="420" y="550" class="t b">all-linear-last-half</text>

  <rect x="760" y="180" width="260" height="260" class="box c"/>
  <text x="790" y="225" class="t b">Decision filter</text>
  <text x="790" y="265" class="t n">1. Preserve intelligence</text>
  <text x="790" y="295" class="t n">2. Move in the right direction</text>
  <text x="790" y="325" class="t n">3. Remain deployable</text>

  <rect x="1120" y="180" width="230" height="120" class="box d"/>
  <text x="1150" y="225" class="t b">Mainline survives</text>

  <rect x="1120" y="360" width="230" height="120" class="box e"/>
  <text x="1150" y="405" class="t b">Discard / archive</text>

  <path d="M300 240 H390" class="arrow"/>
  <path d="M640 170 H760" class="arrow"/>
  <path d="M640 300 H760" class="arrow"/>
  <path d="M640 430 H760" class="arrow"/>
  <path d="M640 560 H760" class="arrow"/>
  <path d="M1020 250 H1120" class="arrow"/>
  <path d="M1020 390 H1120" class="arrow"/>
</svg>