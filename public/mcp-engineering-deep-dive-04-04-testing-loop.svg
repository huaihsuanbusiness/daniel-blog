<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
<defs><style>.bg{fill:#f8fafc}.title{font:700 28px Arial,Inter,sans-serif;fill:#0f172a}.subtitle{font:400 14px Arial,Inter,sans-serif;fill:#475569}.boxt{font:700 16px Arial,Inter,sans-serif;fill:#0f172a}.txt{font:400 13px Arial,Inter,sans-serif;fill:#334155}.note{font:400 12px Arial,Inter,sans-serif;fill:#64748b}.edge{stroke-width:1.6;rx:18;ry:18}.line{stroke:#64748b;stroke-width:2.4;fill:none;marker-end:url(#arrow)}.g{fill:#dcfce7;stroke:#86efac}.b{fill:#dbeafe;stroke:#93c5fd}.o{fill:#ffedd5;stroke:#fdba74}.p{fill:#ede9fe;stroke:#c4b5fd}.n{fill:#fff;stroke:#cbd5e1}.r{fill:#ffe4e6;stroke:#fda4af}</style><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#64748b"/></marker></defs>
<rect class="bg" x="0" y="0" width="1280" height="720"/>
<text class="title" x="50" y="56">A practical testing loop for skills and runtime selection</text>
<text class="subtitle" x="50" y="82">Do not stop at editing files. Verify what the session can actually see.</text>
<rect class="r edge" x="70" y="160" width="220" height="120"/>
<text class="boxt" x="88" y="190">1. Write skill</text>
<text class="txt" x="88" y="216">manifest</text>
<text class="txt" x="88" y="236">instructions</text>
<text class="txt" x="88" y="256">examples</text>
<rect class="b edge" x="350" y="160" width="220" height="120"/>
<text class="boxt" x="368" y="190">2. Align surface</text>
<text class="txt" x="368" y="216">tool description</text>
<text class="txt" x="368" y="236">schema</text>
<text class="txt" x="368" y="256">visibility</text>
<rect class="o edge" x="630" y="160" width="220" height="120"/>
<text class="boxt" x="648" y="190">3. Redeploy</text>
<text class="txt" x="648" y="216">restart server</text>
<text class="txt" x="648" y="236">refresh session</text>
<rect class="p edge" x="910" y="160" width="250" height="120"/>
<text class="boxt" x="928" y="190">4. Verify runtime</text>
<text class="txt" x="928" y="216">list_tools()</text>
<text class="txt" x="928" y="236">list_skills()</text>
<text class="txt" x="928" y="256">test real prompts</text>
<rect class="n edge" x="280" y="380" width="660" height="120"/>
<text class="boxt" x="298" y="410">Success condition</text>
<text class="txt" x="298" y="436">Repo assets, server metadata, live inventory, and runtime behaviour all point in the same direction.</text>
<path class="line" d="M290 220 H350"/>
<path class="line" d="M570 220 H630"/>
<path class="line" d="M850 220 H910"/>
<path class="line" d="M540 280 V380"/>
</svg>