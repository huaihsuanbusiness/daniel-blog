<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
<title id="title">Visible Web3 versus Invisible Web3</title><desc id="desc">A comparison between user-facing Web3 complexity and background infrastructure Web3.</desc>
<rect width="1200" height="675" fill="#f8fafc"/><text x="600" y="58" text-anchor="middle" font-family="Arial, Inter, sans-serif" font-size="32" font-weight="700" fill="#0f172a">Invisible Web3: from user education to infrastructure</text><text x="600" y="94" text-anchor="middle" font-family="Arial, Inter, sans-serif" font-size="16" fill="#475569">The successful version is often the one users do not need to consciously operate.</text>
<rect x="70" y="135" width="500" height="440" rx="28" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/><rect x="630" y="135" width="500" height="440" rx="28" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
<text x="320" y="185" text-anchor="middle" font-family="Arial, Inter, sans-serif" font-size="24" font-weight="700" fill="#334155">Visible Web3</text><text x="880" y="185" text-anchor="middle" font-family="Arial, Inter, sans-serif" font-size="24" font-weight="700" fill="#334155">Invisible Web3</text>
<g font-family="Arial, Inter, sans-serif" font-size="18">
<rect x="140" y="225" width="360" height="56" rx="16" fill="#fee2e2"/><text x="320" y="260" text-anchor="middle" fill="#7f1d1d">Wallet setup before value</text>
<rect x="140" y="303" width="360" height="56" rx="16" fill="#ffedd5"/><text x="320" y="338" text-anchor="middle" fill="#7c2d12">Chains, gas, signatures</text>
<rect x="140" y="381" width="360" height="56" rx="16" fill="#fef9c3"/><text x="320" y="416" text-anchor="middle" fill="#713f12">Token-first storytelling</text>
<rect x="140" y="459" width="360" height="56" rx="16" fill="#e0f2fe"/><text x="320" y="494" text-anchor="middle" fill="#075985">Users learn the plumbing</text>
<rect x="700" y="225" width="360" height="56" rx="16" fill="#dcfce7"/><text x="880" y="260" text-anchor="middle" fill="#14532d">Task-first experience</text>
<rect x="700" y="303" width="360" height="56" rx="16" fill="#dbeafe"/><text x="880" y="338" text-anchor="middle" fill="#1e3a8a">Wallet policies in background</text>
<rect x="700" y="381" width="360" height="56" rx="16" fill="#ede9fe"/><text x="880" y="416" text-anchor="middle" fill="#4c1d95">Stablecoin rails hidden</text>
<rect x="700" y="459" width="360" height="56" rx="16" fill="#f0fdfa"/><text x="880" y="494" text-anchor="middle" fill="#134e4a">Users notice completion</text>
</g>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#64748b"/></marker></defs>
<path d="M570 355 C595 340, 605 340, 630 355" fill="none" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/><text x="600" y="330" text-anchor="middle" font-family="Arial, Inter, sans-serif" font-size="15" fill="#475569">maturity</text>
<rect x="180" y="602" width="840" height="42" rx="18" fill="#0f172a"/><text x="600" y="629" text-anchor="middle" font-family="Arial, Inter, sans-serif" font-size="18" fill="#f8fafc">The question shifts from “Do users understand Web3?” to “Did Web3 help the task disappear?”</text>
</svg>
