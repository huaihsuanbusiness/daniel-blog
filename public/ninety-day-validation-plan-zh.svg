<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">90-Day Validation Plan 90天驗證計畫</title>
  <desc id="desc">90 天結構化驗證計畫，分三個 30 天階段，包含決策關卡。</desc>
  <style>
text{font-family:'Noto Sans TC',Arial,sans-serif;fill:#1f2937}.bg{fill:#fbfaf7}.h{font-size:28px;font-weight:700;fill:#1e293b}.t{font-size:16px;font-weight:700;fill:#1e293b}.b{font-size:13px}.box{fill:#fff;stroke:#d1d5db;stroke-width:2;rx:16}.c1{fill:#eff6ff;stroke:#93c5fd;stroke-width:2}.c2{fill:#fff7ed;stroke:#fdba74;stroke-width:2}.c3{fill:#f5f3ff;stroke:#c4b5fd;stroke-width:2}.gate{fill:#fff1f2;stroke:#fca5a5;stroke-width:2}
  </style>
  <rect width="960" height="520" rx="24" fill="#fbfaf7"/>
  <text class="h" x="40" y="42">90-Day Validation Plan 90天驗證計畫</text>
  <text class="b" x="40" y="66" fill="#64748b">建設之前先驗證。用證據，不是用直覺。用決策關卡，不是用期望。</text>

  <rect class="c1" x="40" y="88" width="880" height="100" rx="18"/>
  <text class="t" x="60" y="116">Days 1-30: 驗證問題、ICP、痛苦、接觸途徑</text>
  <text class="b" x="60" y="140">10-15 次訪談 + 風險地圖</text>
  <text class="b" x="60" y="160">問題是真的、緊急的、有感的嗎？我們能接觸到他們嗎？有購買流程嗎？</text>

  <rect class="c2" x="40" y="208" width="880" height="100" rx="18"/>
  <text class="t" x="60" y="236">Days 31-60: MVP / Pilot 測試</text>
  <text class="b" x="60" y="260">3 次試驗 + 行為信號</text>
  <text class="b" x="60" y="280">解決方案在實務上有效嗎？他們會付費、使用、推薦——還是只說「好有趣」？</text>

  <rect class="c3" x="40" y="328" width="880" height="100" rx="18"/>
  <text class="t" x="60" y="356">Days 61-90: 商業模式證據</text>
  <text class="b" x="60" y="380">付費 pilot / 合作夥伴 / 停止規則</text>
  <text class="b" x="60" y="400">有商業模式——還是只有功能？有營收證據，還是只有假設？</text>

  <rect class="gate" x="40" y="448" width="880" height="64" rx="18"/>
  <text class="t" x="60" y="478">決策關卡：根據證據，而不是根據創辦人情緒，來決定：繼續、轉向、暫停、或停止。</text>
</svg>
