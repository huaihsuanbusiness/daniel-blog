<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="1" stop-color="#101A2F"/>
    </linearGradient>
    <linearGradient id="line" x1="120" y1="520" x2="950" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34D399"/>
      <stop offset="1" stop-color="#60A5FA"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000" flood-opacity="0.24"/>
    </filter>
  </defs>

  <rect width="1200" height="720" rx="28" fill="url(#bg)"/>
  <text x="72" y="92" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">OpenClaw First-Week Capability Ramp</text>
  <text x="72" y="126" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="18">Stabilise the runtime first. Add reach and power only after the gateway becomes boring and predictable.</text>

  <path d="M110 540C250 540 290 490 390 440C510 380 575 375 665 330C760 283 830 280 940 220" stroke="url(#line)" stroke-width="12" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="92" y="462" width="182" height="112" rx="22" fill="#0F172A" stroke="#34D399" stroke-width="1.5"/>
    <text x="118" y="500" fill="#34D399" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">DAY 1</text>
    <text x="118" y="532" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Gateway validation</text>
    <text x="118" y="560" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="15">Install, onboard, run</text>
    <text x="118" y="581" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="15">one clean chat session</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="302" y="404" width="182" height="112" rx="22" fill="#0F172A" stroke="#38BDF8" stroke-width="1.5"/>
    <text x="328" y="442" fill="#38BDF8" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">DAY 2</text>
    <text x="328" y="474" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">One daily front end</text>
    <text x="328" y="502" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="15">Pick one surface only:</text>
    <text x="328" y="523" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="15">CLI, Dashboard, or Discord</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="512" y="340" width="194" height="120" rx="22" fill="#0F172A" stroke="#60A5FA" stroke-width="1.5"/>
    <text x="538" y="378" fill="#60A5FA" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">DAY 3–4</text>
    <text x="538" y="410" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Workspace + Memory</text>
    <text x="538" y="438" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="15">Turn the runtime into</text>
    <text x="538" y="459" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="15">a real working surface</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="732" y="274" width="168" height="112" rx="22" fill="#0F172A" stroke="#818CF8" stroke-width="1.5"/>
    <text x="758" y="312" fill="#818CF8" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">DAY 5</text>
    <text x="758" y="344" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Browser</text>
    <text x="758" y="372" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="15">Use an isolated profile</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="926" y="206" width="184" height="112" rx="22" fill="#0F172A" stroke="#A78BFA" stroke-width="1.5"/>
    <text x="952" y="244" fill="#A78BFA" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">DAY 6–7</text>
    <text x="952" y="276" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">One private channel</text>
    <text x="952" y="304" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="15">Connect one low-risk</text>
    <text x="952" y="325" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="15">personal messaging surface</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="760" y="446" width="348" height="184" rx="24" fill="#111827" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="10 10"/>
    <text x="790" y="488" fill="#F59E0B" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">WAIT UNTIL LATER</text>
    <text x="790" y="528" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Do not open all of this in week one</text>
    <text x="790" y="564" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="16">• Automation / cron / heartbeat everywhere</text>
    <text x="790" y="592" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="16">• Public group channels</text>
    <text x="790" y="620" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="16">• Full tool surface without guardrails</text>
    <text x="790" y="648" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="16">• Public remote exposure before trust is earned</text>
  </g>
</svg>
