<svg width="1320" height="680" viewBox="0 0 1320 680" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 28px Arial, Inter, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 14px Arial, Inter, sans-serif; fill: #475569; }
      .box-title { font: 700 16px Arial, Inter, sans-serif; fill: #0f172a; }
      .box-text { font: 400 13px Arial, Inter, sans-serif; fill: #334155; }
      .note { font: 400 12px Arial, Inter, sans-serif; fill: #64748b; }
      .store { fill: #dbeafe; stroke: #93c5fd; }
      .logic { fill: #ffedd5; stroke: #fdba74; }
      .route { fill: #ede9fe; stroke: #c4b5fd; }
      .memory { fill: #fce7f3; stroke: #f9a8d4; }
      .neutral { fill: #ffffff; stroke: #cbd5e1; }
      .box { stroke-width: 1.5; rx: 18; ry: 18; }
      .line { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect class="bg" width="1320" height="680"/>
  <text class="title" x="50" y="58">RAG deep analysis lane: resolve, retrieve, research, then judge</text>
  <text class="subtitle" x="50" y="84">The expensive path begins only after one role has been resolved clearly and the relevant evidence has been assembled.</text>

  <rect class="route box" x="50" y="170" width="180" height="108"/>
  <text class="box-title" x="70" y="202">Target Resolver</text>
  <text class="box-text" x="70" y="226">job ID or</text>
  <text class="box-text" x="70" y="244">company + title</text>
  <text class="box-text" x="70" y="262">must map to one role</text>

  <rect class="memory box" x="290" y="160" width="190" height="128"/>
  <text class="box-title" x="310" y="192">Dependency Gate</text>
  <text class="box-text" x="310" y="216">stop early if target job</text>
  <text class="box-text" x="310" y="234">is still ambiguous</text>
  <text class="box-text" x="310" y="252">or missing</text>

  <rect class="logic box" x="540" y="144" width="200" height="160"/>
  <text class="box-title" x="560" y="176">JD Normalisation</text>
  <text class="box-text" x="560" y="200">fetch selected role</text>
  <text class="box-text" x="560" y="218">extract clean JD text</text>
  <text class="box-text" x="560" y="236">build analysis context</text>

  <rect class="store box" x="800" y="120" width="210" height="208"/>
  <text class="box-title" x="820" y="152">CV Evidence Retrieval</text>
  <text class="box-text" x="820" y="176">JD -> embedding query</text>
  <text class="box-text" x="820" y="194">Qdrant query</text>
  <text class="box-text" x="820" y="212">payload filter: source_type = cv</text>
  <text class="box-text" x="820" y="230">top evidence chunks only</text>

  <rect class="logic box" x="1080" y="120" width="190" height="208"/>
  <text class="box-title" x="1100" y="152">Company Brief</text>
  <text class="box-text" x="1100" y="176">grounded search</text>
  <text class="box-text" x="1100" y="194">facts vs inference</text>
  <text class="box-text" x="1100" y="212">compact downstream memo</text>

  <rect class="route box" x="540" y="402" width="260" height="160"/>
  <text class="box-title" x="560" y="434">Final Analysis Generator</text>
  <text class="box-text" x="560" y="458">uses JD + CV evidence + company brief only</text>
  <text class="box-text" x="560" y="476">no browsing in this step</text>
  <text class="box-text" x="560" y="494">analyse job / application pack / interview brief</text>

  <rect class="memory box" x="860" y="402" width="180" height="160"/>
  <text class="box-title" x="880" y="434">Compliance Check</text>
  <text class="box-text" x="880" y="458">score vs verdict</text>
  <text class="box-text" x="880" y="476">label discipline</text>
  <text class="box-text" x="880" y="494">tone calibration</text>

  <rect class="memory box" x="1100" y="402" width="170" height="160"/>
  <text class="box-title" x="1120" y="434">Repair if Needed</text>
  <text class="box-text" x="1120" y="458">fix structure</text>
  <text class="box-text" x="1120" y="476">no new facts allowed</text>
  <text class="box-text" x="1120" y="494">minimal correction pass</text>

  <rect class="neutral box" x="50" y="402" width="420" height="170"/>
  <text class="box-title" x="70" y="434">Why this feels more trustworthy</text>
  <text class="box-text" x="70" y="458">Searching, evidence retrieval, and final judgement are not</text>
  <text class="box-text" x="70" y="480">collapsed into one opaque prompt. Each stage has a narrower</text>
  <text class="box-text" x="70" y="502">job, which makes the lane easier to audit and easier to tune.</text>

  <path class="line" d="M230 224 H290"/>
  <path class="line" d="M480 224 H540"/>
  <path class="line" d="M740 224 H800"/>
  <path class="line" d="M1010 224 H1080"/>
  <path class="line" d="M640 304 V402"/>
  <path class="line" d="M920 328 V402"/>
  <path class="line" d="M1175 328 V402"/>
  <path class="line" d="M800 482 H860"/>
  <path class="line" d="M1040 482 H1100"/>
</svg>
