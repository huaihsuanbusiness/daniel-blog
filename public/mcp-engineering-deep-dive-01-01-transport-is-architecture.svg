<svg width="1160" height="520" viewBox="0 0 1160 520" xmlns="http://www.w3.org/2000/svg">
<defs><style>
      .bg { fill: #f8fafc; }
      .title { font: 700 28px Arial, Inter, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 14px Arial, Inter, sans-serif; fill: #475569; }
      .box-title { font: 700 16px Arial, Inter, sans-serif; fill: #0f172a; }
      .box-text { font: 400 13px Arial, Inter, sans-serif; fill: #334155; }
      .note { font: 400 12px Arial, Inter, sans-serif; fill: #64748b; }
      .green { fill: #dcfce7; stroke: #86efac; }
      .blue { fill: #dbeafe; stroke: #93c5fd; }
      .orange { fill: #ffedd5; stroke: #fdba74; }
      .purple { fill: #ede9fe; stroke: #c4b5fd; }
      .pink { fill: #fce7f3; stroke: #f9a8d4; }
      .neutral { fill: #ffffff; stroke: #cbd5e1; }
      .edge { stroke-width: 1.5; rx: 18; ry: 18; }
      .line { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #94a3b8; stroke-width: 2; fill: none; stroke-dasharray: 6 6; marker-end: url(#arrow); }
    </style><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#64748b"/></marker></defs>
<rect class="bg" x="0" y="0" width="1160" height="520"/>
<text class="title" x="50" y="56">Transport Is Architecture</text>
<text class="subtitle" x="50" y="82">The moment a server becomes remote, transport enters the design, not just deployment.</text>
<rect class="blue edge" x="60" y="150" width="200" height="100"/>
<text class="box-title" x="80" y="180">Local stdio</text>
<text class="box-text" x="80" y="204">single client</text>
<text class="box-text" x="80" y="224">great for dev</text>
<rect class="orange edge" x="330" y="150" width="220" height="100"/>
<text class="box-title" x="350" y="180">Remote transport</text>
<text class="box-text" x="350" y="204">URL endpoint</text>
<text class="box-text" x="350" y="224">multi-client reality</text>
<rect class="purple edge" x="620" y="150" width="220" height="100"/>
<text class="box-title" x="640" y="180">Proxy + TLS</text>
<text class="box-text" x="640" y="204">reverse proxy</text>
<text class="box-text" x="640" y="224">edge behavior</text>
<rect class="green edge" x="910" y="150" width="190" height="100"/>
<text class="box-title" x="930" y="180">Host Compatibility</text>
<text class="box-text" x="930" y="204">ChatGPT / API</text>
<text class="box-text" x="930" y="224">tool listing</text>
<rect class="neutral edge" x="330" y="330" width="480" height="120"/>
<text class="box-title" x="350" y="360">Core idea</text>
<text class="box-text" x="350" y="384">Transport shapes how the server lives.</text>
<text class="box-text" x="350" y="404">It is not only about moving bytes.</text>
<path class="line" d="M260 200 H330"/>
<path class="line" d="M550 200 H620"/>
<path class="line" d="M840 200 H910"/>
<path class="line" d="M570 250 V330"/>
</svg>