<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760">
  <defs><style>
    text { font-family: Arial, Inter, sans-serif; fill:#233043; }
    .title { font-size: 28px; font-weight: 700; }
    .subtitle { font-size: 15px; fill:#5b6b7f; }
    .box { stroke:#8393a7; stroke-width:2; rx:22; ry:22; }
    .h { font-size:20px; font-weight:700; }
    .p { font-size:15px; }
  </style></defs>
  <text x="60" y="56" class="title">Memory types in a local LLM stack</text>
  <text x="60" y="84" class="subtitle">Not one memory, but several layers with different responsibilities</text>
  <rect x="60" y="130" width="500" height="160" class="box" fill="#eef6ff"/>
  <text x="90" y="170" class="h">Context memory</text><text x="90" y="200" class="p">Session-local. Current task, temporary rules, short-lived constraints.</text>
  <rect x="640" y="130" width="500" height="160" class="box" fill="#f6f2ff"/>
  <text x="670" y="170" class="h">External memory</text><text x="670" y="200" class="p">Documents, RAG, vector databases, project data, mutable facts.</text>
  <rect x="60" y="340" width="500" height="180" class="box" fill="#fdeff3"/>
  <text x="90" y="380" class="h">Parameter memory</text><text x="90" y="410" class="p">Pretraining, instruction tuning, LoRA, adapters, and deeper weight updates.</text>
  <text x="90" y="437" class="p">Durable, but expensive and harder to reverse.</text>
  <rect x="640" y="340" width="500" height="180" class="box" fill="#fff6ea"/>
  <text x="670" y="380" class="h">Preference memory</text><text x="670" y="410" class="p">How the model tends to rank acceptable answers, tone, and response style.</text>
  <text x="670" y="437" class="p">Can live in prompts, examples, adapters, or preference optimisation.</text>
  <rect x="220" y="570" width="760" height="120" class="box" fill="#edf4ef"/>
  <text x="250" y="612" class="h">Working rule</text>
  <text x="250" y="640" class="p">Do not ask “does the model remember this?” first. Ask what kind of memory this thing belongs to.</text>
</svg>