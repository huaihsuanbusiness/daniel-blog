<svg xmlns="http://www.w3.org/2000/svg" width="1220" height="610" viewBox="0 0 1220 610">
  <defs>
    <style>
      .title { font: 700 28px Inter, Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 14px Inter, Arial, sans-serif; fill: #475569; }
      .line { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #94a3b8; stroke-width: 2; fill: none; stroke-dasharray: 6 6; marker-end: url(#arrow); }
      .note { font: 12px Inter, Arial, sans-serif; fill: #64748b; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1220" height="610" fill="#f8fafc"/>
  <text x="48" y="52" class="title">OCI network checks</text>
  <text x="48" y="78" class="subtitle">Most “FastMCP problems” start one layer earlier: network reachability.</text>
  <rect x="60" y="150" width="220" height="130" rx="18" ry="18" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
<text x="80" y="180" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Instance checks</text>
<text x="80" y="205" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">public IP assigned</text>
<text x="80" y="225" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">correct image user</text>
<text x="80" y="245" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">private key ready</text>
<rect x="350" y="150" width="220" height="130" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
<text x="370" y="180" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">VCN / subnet</text>
<text x="370" y="205" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">public subnet</text>
<text x="370" y="225" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">CIDR sane</text>
<text x="370" y="245" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">wizard or manual</text>
<rect x="640" y="150" width="220" height="130" rx="18" ry="18" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
<text x="660" y="180" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Route path</text>
<text x="660" y="205" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">0.0.0.0/0 to IGW</text>
<text x="660" y="225" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">egress works</text>
<text x="660" y="245" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">subnet uses right table</text>
<rect x="930" y="150" width="220" height="130" rx="18" ry="18" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.5"/>
<text x="950" y="180" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Security</text>
<text x="950" y="205" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">22 for SSH</text>
<text x="950" y="225" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">443 for HTTPS</text>
<text x="950" y="245" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">egress allowed</text>
<rect x="240" y="390" width="340" height="140" rx="18" ry="18" fill="#fff1f2" stroke="#fda4af" stroke-width="1.5"/>
<text x="260" y="420" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">If SSH fails</text>
<text x="260" y="445" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">check public IP</text>
<text x="260" y="465" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">check route table</text>
<text x="260" y="485" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">check security rules</text>
<text x="260" y="505" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">check username and key</text>
<rect x="650" y="390" width="340" height="140" rx="18" ry="18" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
<text x="670" y="420" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Do before app debugging</text>
<text x="670" y="445" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">SSH into VM</text>
<text x="670" y="465" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">curl local port</text>
<text x="670" y="485" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">confirm nginx config</text>
<text x="670" y="505" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">confirm DNS target</text>
<path class="line" d="M280 215 H350"/>
<path class="line" d="M570 215 H640"/>
<path class="line" d="M860 215 H930"/>
<path class="dash" d="M450 280 V390"/>
<path class="dash" d="M830 280 V390"/>
</svg>