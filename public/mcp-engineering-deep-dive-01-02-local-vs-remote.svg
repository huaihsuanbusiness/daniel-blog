<svg width="980" height="520" viewBox="0 0 980 520" xmlns="http://www.w3.org/2000/svg">
<defs><style>
      .bg { fill: #f8fafc; }
      .title { font: 700 28px Arial, Inter, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 14px Arial, Inter, sans-serif; fill: #475569; }
      .box-title { font: 700 16px Arial, Inter, sans-serif; fill: #0f172a; }
      .box-text { font: 400 13px Arial, Inter, sans-serif; fill: #334155; }
      .note { font: 400 12px Arial, Inter, sans-serif; fill: #64748b; }
      .green { fill: #dcfce7; stroke: #86efac; }
      .blue { fill: #dbeafe; stroke: #93c5fd; }
      .orange { fill: #ffedd5; stroke: #fdba74; }
      .purple { fill: #ede9fe; stroke: #c4b5fd; }
      .pink { fill: #fce7f3; stroke: #f9a8d4; }
      .neutral { fill: #ffffff; stroke: #cbd5e1; }
      .edge { stroke-width: 1.5; rx: 18; ry: 18; }
      .line { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #94a3b8; stroke-width: 2; fill: none; stroke-dasharray: 6 6; marker-end: url(#arrow); }
    </style><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#64748b"/></marker></defs>
<rect class="bg" x="0" y="0" width="980" height="520"/>
<text class="title" x="50" y="56">Local vs Remote Milestones</text>
<text class="subtitle" x="50" y="82">Local success does not automatically produce a remote-grade MCP service.</text>
<rect class="blue edge" x="60" y="150" width="230" height="110"/>
<text class="box-title" x="80" y="180">Local Demo</text>
<text class="box-text" x="80" y="204">tool runs</text>
<text class="box-text" x="80" y="224">localhost works</text>
<text class="box-text" x="80" y="244">single process</text>
<rect class="orange edge" x="370" y="150" width="230" height="110"/>
<text class="box-title" x="390" y="180">Remote Ready</text>
<text class="box-text" x="390" y="204">public URL</text>
<text class="box-text" x="390" y="224">proxy + TLS</text>
<text class="box-text" x="390" y="244">real host/client</text>
<rect class="purple edge" x="680" y="150" width="230" height="110"/>
<text class="box-title" x="700" y="180">Operational Load</text>
<text class="box-text" x="700" y="204">auth</text>
<text class="box-text" x="700" y="224">path stability</text>
<text class="box-text" x="700" y="244">stream semantics</text>
<rect class="neutral edge" x="370" y="330" width="380" height="120"/>
<text class="box-title" x="390" y="360">Different milestones</text>
<text class="box-text" x="390" y="384">“It runs” is not “it survives real clients”.</text>
<text class="box-text" x="390" y="404">Remote readiness adds network truth.</text>
<path class="line" d="M290 205 H370"/>
<path class="line" d="M600 205 H680"/>
<path class="line" d="M570 260 V330"/>
</svg>