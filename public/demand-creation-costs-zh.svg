<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" role="img" aria-labelledby="title desc">
  <title id="title">需求建立可以降低三種成本</title>
  <desc id="desc">需求建立可以降低三種成本：理解成本、信任成本、行動成本。</desc>
  <style>
    text { font-family: 'Noto Sans TC', Arial, sans-serif; }
    .h { font-size: 28px; font-weight: 700; fill: #1e293b; }
    .sub { font-size: 16px; fill: #64748b; }
    .t { font-size: 20px; font-weight: 700; fill: #1e293b; }
    .desc { font-size: 16px; fill: #1e293b; }
    .box { fill: #fff; stroke: #d1d5db; stroke-width: 2; rx: 18; }
    .box1 { fill: #eff6ff; stroke: #93c5fd; stroke-width: 2; }
    .box2 { fill: #fff7ed; stroke: #fdba74; stroke-width: 2; }
    .box3 { fill: #f5f3ff; stroke: #c4b5fd; stroke-width: 2; }
  </style>
  <rect width="1000" height="600" rx="24" fill="#fbfaf7"/>

  <text class="h" x="40" y="48">需求建立可以降低三種成本</text>
  <text class="sub" x="40" y="74">目標不是更多內容。目標是降低切換、決定、行動的成本。</text>

  <rect class="box box1" x="40" y="98" width="920" height="130" rx="18"/>
  <text class="t" x="64" y="130">1. 理解成本</text>
  <text class="desc" x="64" y="158">他們不理解你解決的是什麼問題。</text>
  <text class="desc" x="64" y="184">透過讓問題具體、情境清楚、落差可測量，來降低這個成本。</text>

  <rect class="box box2" x="40" y="248" width="920" height="130" rx="18"/>
  <text class="t" x="64" y="280">2. 信任成本</text>
  <text class="desc" x="64" y="308">他們還不相信你能交付。</text>
  <text class="desc" x="64" y="334">在要求承諾之前先展示證據：社會證明、試用、數據、或推薦，來降低這個成本。</text>

  <rect class="box box3" x="40" y="398" width="920" height="130" rx="18"/>
  <text class="t" x="64" y="430">3. 行動成本</text>
  <text class="desc" x="64" y="458">改變感覺太難，或不夠緊急。</text>
  <text class="desc" x="64" y="484">透過降低第一步的門檻、讓期待的結果具體可觸及、減少「嘗試」所感受到的風險，來降低這個成本。</text>
</svg>
